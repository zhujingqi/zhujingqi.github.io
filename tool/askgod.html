				overflow-x: hidden;
			}

				font-size: 40px;
				padding: 20px;
			}

				width: 300px;
				padding: 12px;

				background: #222;
				color: #fff;
				transition: 0.3s all;
			}

			input:focus {
				border-color: #ffd700;
				outline: none;
			}

			button {
				padding: 10px 16px;
				font-size: 16px;
				margin-left: 8px;
				cursor: pointer;
				border-radius: 30px;
				border: 2px solid #444;
				background: #333;
				color: #ffd700;
				font-weight: bold;
				transition: 0.3s all;
			}

			button:hover {
				background: #444;
				transform: scale(1.05);
			}

			#answer {
				margin-top: 40px;
				font-size: 20px;
				color: #ffd700;
				min-height: 80px;
				line-height: 1.6;
				display: inline-block;
				background: #00557f;
				padding: 16px 24px;
				border-radius: 30px;
				position: relative;
				max-width: 400px;
				text-align: left;
				box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
			}

			#answer::after {
				content: "";
				position: absolute;
				bottom: -15px;
				left: 50%;
				transform: translateX(-50%);
				border-width: 15px 15px 0 15px;
				border-style: solid;
				border-color: #00557f transparent transparent transparent;
			}

			.char {
				opacity: 0;
				display: inline-block;
				transform: translateY(20px);
				animation-name: floatInChar;
				animation-duration: 0.6s;
				animation-fill-mode: forwards;
			}

			@keyframes floatInChar {
				0% {
					opacity: 0;
					transform: translateY(20px);
				}

				100% {
					opacity: 1;
					transform: translateY(0);
				}
			}

			#godCanvas {
				position: fixed;
				left: 50%;
				bottom: 0;
				transform: translateX(-50%);
				pointer-events: none;
			}

			async function postQuestion(q) {
				const res = await fetch(dbReadURL);
				const oldText = await res.text();
				const entry = q + "\n";
				const params = new URLSearchParams();
				params.append("key", dbKey);
				params.append("value", oldText + entry);
				await fetch(dbWriteURL, {
					method: "POST",
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded'
					},
					body: params.toString()
				});
			}
			async function ask() {
				const q = document.getElementById("q").value.trim();
				if (!q) return;
				const ansDiv = document.getElementById("answer");
				ansDiv.innerHTML = "";
				const thinking = "上帝在思考...";
				for (let i = 0; i < thinking.length; i++) {
					const span = document.createElement("span");
					span.className = "char";
					span.style.animationDelay = `${i * 0.05}s`;
					span.textContent = thinking[i];
					ansDiv.appendChild(span);
				}
				postQuestion(q);
				setTimeout(() => {
					ansDiv.innerHTML = "";
					let ans = "";
					for (let a = 0; a < 2; a++) {
						ans = ans + getAnswer();
					}
					for (let i = 0; i < ans.length; i++) {
						const span = document.createElement("span");
						span.className = "char";
						span.style.animationDelay = `${i * 0.05}s`;
						span.textContent = ans[i];
						ansDiv.appendChild(span);
					}
				}, 3000);
			}
			const canvas = document.getElementById("godCanvas");
			const ctx = canvas.getContext("2d");
			let t = 0;
			let haloPhase = 0;
			let blinkInterval = 300;
			let blinkTimer = 0;
			let blinking = false;
			let blinkDuration = 10;

			function roundRect(ctx, x, y, w, h, r) {
				ctx.beginPath();
				ctx.moveTo(x + r, y);
				ctx.lineTo(x + w - r, y);
				ctx.quadraticCurveTo(x + w, y, x + w, y + r);
				ctx.lineTo(x + w, y + h - r);
				ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
				ctx.lineTo(x + r, y + h);
				ctx.quadraticCurveTo(x, y + h, x, y + h - r);
				ctx.lineTo(x, y + r);
				ctx.quadraticCurveTo(x, y, x + r, y);
				ctx.closePath();
			}

			function drawGod() {
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				const floatY = Math.sin(t * 0.03) * 6;
				ctx.save();
				ctx.translate(canvas.width / 2, 220 + floatY);
				/* 头位置 */
				const headY = -85;
				const haloY = headY - 60;
				const haloWidth = 40;
				const haloHeight = 10;
				/* 呼吸亮度 */
				let glow = 0.7 + Math.sin(haloPhase) * 0.25;
				ctx.save();
				ctx.rotate(Math.sin(haloPhase * 0.7) * 0.06);
				/* 外层柔光 */
				ctx.beginPath();
				ctx.ellipse(0, haloY, haloWidth + 6, haloHeight + 4, 0, 0, Math.PI * 2);
				ctx.fillStyle = "rgba(255,220,120," + (0.15 + glow * 0.2) + ")";
				ctx.fill();

				/* 主光环（细环） */
				ctx.beginPath();
				ctx.ellipse(0, haloY, haloWidth, haloHeight, 0, 0, Math.PI * 2);
				ctx.lineWidth = 3;
				ctx.strokeStyle = "rgba(255,215,120," + glow + ")";
				ctx.shadowColor = "gold";
				ctx.shadowBlur = 15 + glow * 10;
				ctx.stroke();

				/* 内侧高光 */
				ctx.beginPath();
				ctx.ellipse(0, haloY - 1, haloWidth - 6, haloHeight - 3, 0, 0, Math.PI);
				ctx.lineWidth = 1.5;
				ctx.strokeStyle = "rgba(255,255,230,0.8)";
				ctx.stroke();

				ctx.shadowBlur = 0;
				ctx.restore();
				/* 头位置 */

				/* 头发 */
				ctx.fillStyle = "#ffffff";
				ctx.beginPath();
				ctx.arc(0, headY - 10, 32, Math.PI, 0); // 上半圆头发
				ctx.fill();

				/* 侧边头发 */
				ctx.beginPath();
				ctx.arc(-22, headY - 2, 12, Math.PI / 2, Math.PI * 1.5);
				ctx.arc(22, headY - 2, 12, -Math.PI / 2, Math.PI / 2);
				ctx.fill();

				/* 头 */
				ctx.beginPath();
				ctx.arc(0, headY, 28, 0, Math.PI * 2);
				ctx.fillStyle = "#ffe0a0";
				ctx.fill();
				ctx.strokeStyle = "#fff";
				ctx.lineWidth = 3;
				ctx.stroke();

				/* 眼睛 */
				ctx.fillStyle = "#000";
				let eyeHeight = blinking ? 1 : 3;

				ctx.beginPath();
				ctx.ellipse(-10, headY - 5, 3, eyeHeight, 0, 0, Math.PI * 2);
				ctx.ellipse(10, headY - 5, 3, eyeHeight, 0, 0, Math.PI * 2);
				ctx.fill();

				/* 身体衣服（白色圆角矩形） */
				ctx.fillStyle = "#eee";
				ctx.strokeStyle = "#eee";
				ctx.lineWidth = 2;

				roundRect(ctx, -40, -50, 80, 130, 20);
				ctx.fill();
				ctx.stroke();

				/* 手臂 */
				const armSwing = Math.sin(t * 0.08) * 12;

				ctx.strokeStyle = "#ffe0a0";
				ctx.lineWidth = 12;
				ctx.lineCap = "round";

				ctx.beginPath();
				ctx.moveTo(-40, -30);
				ctx.lineTo(-70 - armSwing, -10);
				ctx.stroke();

				ctx.beginPath();
				ctx.moveTo(40, -30);
				ctx.lineTo(70 + armSwing, -10);
				ctx.stroke();

				/* 腿 */
				ctx.lineWidth = 14;

				ctx.beginPath();
				ctx.moveTo(-15, 80);
				ctx.lineTo(-15, 120);
				ctx.stroke();

				ctx.beginPath();
				ctx.moveTo(15, 80);
				ctx.lineTo(15, 120);
				ctx.stroke();

				ctx.restore();
				blinkTimer++;
				if (!blinking && blinkTimer >= blinkInterval) {
					blinking = true;
					blinkTimer = 0;
				}
				if (blinking && blinkTimer >= blinkDuration) {
					blinking = false;
					blinkTimer = 0;
				}
				t++;
				haloPhase += 0.05;
				requestAnimationFrame(drawGod);
			}
			drawGod();
			const defaultAnswers = [
				"你有什么疑惑吗？",
				"上帝在关注你的问题。",
				"思考后再提问，我在聆听。",
				"每一个疑问都是通往智慧的道路。",
				"向我提出你的问题吧。",
				"你在想什么？",
				"我能看见你的思考，慢慢说吧。",
				"每个问题都有它独特的意义。",
				"选择困难症？找我吧。",
				"May God bless you. ✝"
			];
			window.onload = function() {
				const ansDiv = document.getElementById("answer");
				const randIndex = Math.floor(Math.random() * defaultAnswers.length);
				ansDiv.textContent = defaultAnswers[randIndex];
			};
		</script>
	</body>
</html>
