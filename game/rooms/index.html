<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>ROOMS - Zhujingqi</title>
		<style>
			* {
				-webkit-user-select: none;
				-moz-user-select: none;
				-ms-user-select: none;
				user-select: none;
			}

			body {
				margin: 0;
				background: #000;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				overflow: hidden;
			}

			#game-container {
				position: relative;
				box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
				border: 5px solid #333;
				width: min(100vw, calc(100vh * 16 / 9));
				height: min(100vh, calc(100vw * 9 / 16));
				aspect-ratio: 16 / 9;
				background: #1a1a1a;
			}

			#game-canvas {
				width: 1280px;
				height: 720px;
				image-rendering: pixelated;
				transform-origin: top left;
			}

			canvas {
				display: block;
				background: #1a1a1a;
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
			}

			#ui-layer {
				position: absolute;
				top: clamp(12px, 8vh, 110px);
				left: clamp(12px, 2vw, 30px);
				font-size: clamp(16px, 2vw, 28px);
				color: #fff;
				font-weight: bold;
				text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 2px 2px 2px #000;
				pointer-events: none;
				z-index: 10;
				display: none;
			}

			#ui-layer.supply {
				color: gold;
				text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 2px 2px 2px #000;
			}

			#score-layer {
				position: absolute;
				top: 150px;
				left: 30px;
				color: #0f0;
				font-size: 24px;
				font-weight: bold;
				text-shadow: 1px 1px 2px #000;
				z-index: 10;
				display: none;
			}

			#gold-display {
				position: absolute;
				top: 185px;
				left: 30px;
				color: gold;
				font-size: 24px;
				font-weight: bold;
				text-shadow: 1px 1px 2px #000;
				z-index: 10;
				display: none;
			}

			#minimap {
				position: absolute;
				top: 10px;
				right: 10px;
				width: clamp(80px, 10vw, 120px);
				height: clamp(80px, 10vw, 120px);
				background: rgba(0, 0, 0, 0.5);
				border: 1px solid #555;
				border-radius: 4px;
				z-index: 10;
				display: none;
			}

			#start-screen {
				position: relative;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				z-index: 500;
				transition: opacity 1s;
			}

			.title-wrapper {
				display: flex;
				align-items: center;
				margin-bottom: 50px;
			}

			.title-icon {
				width: 80px;
				height: auto;
				object-fit: contain;
				margin-right: 20px;
				border-radius: 10px;
				border: 2px solid #0af;
				box-shadow: 0 0 15px #0af;
			}

			#start-screen h1 {
				font-size: clamp(42px, 8vw, 100px);
				color: #fff;
				margin: 0;
				letter-spacing: 0px;
				text-shadow: 0 0 20px rgba(0, 170, 255, 0.8), 4px 4px 0px #333;
				font-family: "Arial Black", sans-serif;
			}

			#volume-box {
				position: absolute;
				top: 12px;
				right: 12px;
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 8px 10px;
				border-radius: 10px;
				background: rgba(0, 0, 0, 0.45);
				color: #fff;
				z-index: 999;
				font-size: 14px;
			}

			#volume-slider {
				-webkit-appearance: none;
				width: 120px;
				height: 6px;
				border-radius: 3px;
				background: #444;
				outline: none;
				cursor: pointer;
				transition: 0.2s;
			}

			.menu-buttons {
				display: flex;
				flex-direction: column;
				gap: 20px;
				align-items: center;
			}

			.btn {
				padding: clamp(10px, 1.2vw, 12px) clamp(28px, 4vw, 60px);
				font-size: clamp(16px, 2vw, 22px);
				color: white;
				border: none;
				border-radius: 30px;
				cursor: pointer;
				transition: all 0.3s;
				box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
				font-weight: bold;
			}

			#start-btn {
				background: linear-gradient(45deg, #0078ff, #00d4ff);
				width: 200px;
				font-size: 18px;
				padding: 12px;
			}

			#start-btn:hover {
				transform: scale(1.08);
				box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
			}

			.sub-btn {
				background: #333;
				color: #fff;
				width: 200px;
				font-size: 18px;
				border: 1px solid #555;
				z-index: 999;
			}

			.sub-btn:hover {
				background: #444;
				color: #0af;
				border-color: #0af;
			}

			#modal-overlay {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.85);
				display: none;
				justify-content: center;
				align-items: center;
				z-index: 10000;
				backdrop-filter: blur(5px);
			}

			#modal-content {
				background: #222;
				border: 2px solid #0af;
				border-radius: 20px;
				padding: 40px;
				max-width: 500px;
				width: 80%;
				color: #ddd;
				position: relative;
				box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
				line-height: 1.6;
			}

			#modal-content h2 {
				color: #0af;
				margin-top: 0;
				border-bottom: 1px solid #444;
				padding-bottom: 10px;
			}

			#modal-close {
				margin-top: 25px;
				background: #0af;
				border: none;
				color: white;
				padding: 10px 30px;
				border-radius: 20px;
				cursor: pointer;
				float: right;
				transition: 0.2s;
			}

			#modal-close:hover {
				background: #00d4ff;
			}

			#pause-menu {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.8);
				display: none;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				color: white;
				z-index: 100;
			}

			#pause-menu h1 {
				font-size: clamp(32px, 5vw, 60px);
				margin-bottom: 40px;
				letter-spacing: 10px;
				color: #0af;
				text-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
			}

			#resume-btn {
				padding: 15px 50px;
				font-size: 24px;
				background: #0af;
				color: white;
				border: none;
				border-radius: 30px;
				cursor: pointer;
				transition: transform 0.2s;
			}

			#resume-btn:hover {
				background: #00d4ff;
				transform: scale(1.05);
			}

			#achievement-modal {
				position: fixed;
				inset: 0;
				display: none;
				justify-content: center;
				align-items: center;
				background: rgba(0, 0, 0, 0.85);
				z-index: 1200;
				overflow: hidden;
			}

			#achievement-modal .modal-content {
				background: #222;
				border: 2px solid #0af;
				border-radius: 20px;
				padding: 40px;
				max-width: 500px;
				width: 80%;
				color: #ddd;
				box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
			}

			.modal {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.85);
				display: none;
				justify-content: center;
				align-items: center;
				z-index: 2000;
			}

			.modal-content {
				background: #222;
				border: 2px solid #0af;
				padding: 30px;
				border-radius: 20px;
				position: relative;
				box-shadow: 0 0 30px rgba(0, 170, 255, 0.4);
			}

			.sidebar-buttons {
				position: absolute;
				left: 20px;
				top: 50%;
				transform: translateY(-50%);
				display: flex;
				flex-direction: column;
				gap: 15px;
				z-index: 999 !important;
			}

			.sidebar-buttons-right {
				position: absolute;
				right: 20px;
				top: 50%;
				transform: translateY(-50%);
				display: flex;
				flex-direction: column;
				gap: 15px;
				z-index: 999 !important;
			}

			.achievement-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 10px;
				max-height: 400px;
				overflow-y: auto;
				scrollbar-width: none;
				-ms-overflow-style: none;
			}

			.achievement-grid::-webkit-scrollbar {
				display: none;
			}

			.achievement-card {
				background: rgba(255, 255, 255, 0.1);
				border: 2px solid #555;
				padding: 10px;
				border-radius: 20px;
				text-align: center;
				transition: all 0.3s;
				filter: grayscale(100%);
				opacity: 0.6;
			}

			.achievement-card.unlocked {
				filter: grayscale(0%);
				opacity: 1;
				border-color: #ffd700;
				box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
				background: rgba(255, 215, 0, 0.1);
			}

			.achievement-card h4 {
				margin: 5px 0;
				font-size: 18px;
				color: #fff;
			}

			.achievement-card p {
				margin: 0;
				font-size: 11px;
				color: #ccc;
			}

			.achievement-toast {
				position: fixed;
				top: 20px;
				right: -350px;
				width: 280px;
				background: rgba(0, 0, 0, 0.9);
				border: 2px solid #ffd700;
				border-radius: 20px;
				padding: 15px;
				display: flex;
				align-items: center;
				gap: 12px;
				box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
				z-index: 9999;
				transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
				pointer-events: none;
			}

			.achievement-toast.show {
				right: 20px;
			}

			.achievement-toast .icon {
				font-size: 24px;
				background: #ffd700;
				width: 40px;
				height: 40px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 8px;
				color: #000;
				flex-shrink: 0;
			}

			.achievement-toast .text h5 {
				margin: 0;
				color: #ffd700;
				font-size: 16px;
			}

			.achievement-toast .text p {
				margin: 3px 0 0 0;
				color: #eee;
				font-size: 12px;
			}

			.upgrade-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 15px;
				max-height: 400px;
				overflow-y: auto;
				scrollbar-width: none;
				-ms-overflow-style: none;
			}

			.upgrade-grid::-webkit-scrollbar {
				display: none;
			}

			.upgrade-card {
				background: rgba(255, 255, 255, 0.05);
				padding: 15px;
				border-radius: 20px;
				border: 1px solid #444;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.upgrade-card .name {
				font-weight: bold;
				color: #fff;
			}

			.upgrade-card .level {
				font-size: 12px;
				color: #0af;
			}

			.buy-btn {
				background: #00aa7f;
				color: white;
				border: none;
				padding: 8px 12px;
				border-radius: 20px;
				cursor: pointer;
			}

			.buy-btn.max {
				background: #555;
				cursor: default;
			}

			#rank-modal h2 {
				margin: 0;
				color: #0af;
			}

			#rank-modal .rank-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
				margin-bottom: 12px;
				padding-right: 40px;
			}

			#rank-modal .rank-tabs {
				display: flex;
				gap: 10px;
				margin-bottom: 12px;
			}

			#rank-modal .rank-tabs button {
				flex: 1;
				background: #333;
				color: #fff;
				border: 1px solid #555;
				border-radius: 20px;
				padding: 8px 12px;
				cursor: pointer;
				transition: 0.2s;
			}

			#rank-modal .rank-tabs button:hover {
				background: #444;
			}

			.rank-grid {
				display: grid;
				grid-template-columns: 1fr;
				gap: 10px;
				width: min(400px, 90vw);
				max-height: min(400px, 70vh);
				overflow-y: auto;
				scrollbar-width: none;
				-ms-overflow-style: none;
				color: #eee;
				font-size: 18px;
			}

			.rank-grid::-webkit-scrollbar {
				display: none;
			}

			.rank-card {
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid #444;
				padding: 12px 14px;
				border-radius: 20px;
				display: grid;
				grid-template-columns: 48px 1fr auto;
				align-items: center;
				gap: 10px;
			}

			.rank-card.top1 {
				border-color: #ffd700;
				background: rgba(255, 215, 0, 0.08);
				box-shadow: 0 0 10px rgba(255, 215, 0, 0.18);
			}

			.rank-card .rank-no {
				font-weight: bold;
				color: #0af;
			}

			.rank-card .rank-name {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.rank-card .rank-value {
				color: #fff;
				font-weight: bold;
			}

			#rank-status {
				margin-top: 10px;
				opacity: 0.75;
				font-size: 12px;
				color: #eee;
			}

			#modal-content,
			#achievement-modal .modal-content,
			.modal-content {
				max-width: min(500px, 90vw);
				max-height: min(80vh, 650px);
			}

			#modal-content,
			#achievement-modal .modal-content,
			.modal-content {
				overflow-y: auto;
			}

			#modal-content,
			#achievement-modal .modal-content,
			.modal-content {
				scrollbar-width: none;
				-ms-overflow-style: none;
			}

			#modal-content::-webkit-scrollbar,
			#achievement-modal .modal-content::-webkit-scrollbar,
			.modal-content::-webkit-scrollbar {
				display: none;
			}

			#achievement-btn {
				border-color: #ffd700;
			}

			#upgrade-btn {
				border-color: #00aa7f;
			}

			#rank-btn {
				border-color: #ffaa00;
			}

			#export-btn {
				border-color: #00aaff;
			}

			#import-btn {
				border-color: #00aaff;
			}

			#reset-btn {
				border-color: #ff5555;
			}

			#cmd-input {
				position: absolute;
				bottom: 20px;
				left: 20px;
				width: 300px;
				padding: 10px;
				font-size: 16px;
				background: rgba(0, 0, 0, 0.8);
				color: white;
				border: 1px solid #555;
				border-radius: 20px;
				display: none;
				z-index: 200;
				outline: none;
			}

			@media (max-width: 900px) {
				#volume-box {
					top: 8px;
					right: 8px;
					font-size: 11px;
					padding: 5px 7px;
					gap: 6px;
				}

				#volume-slider {
					width: 70px;
				}

				.sidebar-buttons,
				.sidebar-buttons-right {
					top: auto;
					bottom: 10px;
					transform: none;
					gap: 10px;
				}

				.sidebar-buttons {
					left: 10px;
				}

				.sidebar-buttons-right {
					right: 10px;
				}

				.btn {
					padding: 8px 18px;
					font-size: 14px;
					border-radius: 22px;
				}

				#start-btn,
				.sub-btn,
				#resume-btn {
					width: 120px;
					padding: 8px 12px;
					font-size: 14px;
				}

				#cmd-input {
					width: min(220px, calc(100vw - 24px));
					bottom: 10px;
					left: 10px;
					font-size: 13px;
					padding: 8px 10px;
				}

				#ui-layer {
					top: 30px;
					left: 12px;
					font-size: 15px;
				}

				#score-layer {
					top: 50px;
					left: 12px;
					font-size: 14px;
				}

				#gold-display {
					top: 70px;
					left: 12px;
					font-size: 14px;
				}

				#minimap {
					position: absolute;
					top: 100px;
					right: 10px;
					width: 50px;
					height: 50px;
				}

				#start-screen h1 {
					font-size: 46px;
				}

				#pause-menu h1 {
					font-size: 34px;
					letter-spacing: 4px;
				}

				.title-wrapper {
					margin-bottom: 28px;
				}

				.title-icon {
					width: 54px;
					margin-right: 12px;
				}

				.achievement-grid {
					grid-template-columns: 1fr 1fr;
				}

				.upgrade-grid {
					grid-template-columns: 1fr;
				}

				.rank-grid {
					width: min(300px, 90vw);
					font-size: 14px;
				}

				.rank-card {
					grid-template-columns: 32px 1fr auto;
					padding: 8px 10px;
				}

				.modal-content,
				#modal-content,
				#achievement-modal .modal-content {
					padding: 22px;
				}
			}

			#mobile-controls {
				display: none;
			}

			@media (max-width: 900px),
			(pointer: coarse) {
				#game-container.playing:not(.paused) #mobile-controls {
					display: block;
				}

				#mobile-controls {
					position: absolute;
					inset: 0;
					z-index: 3000;
					pointer-events: none;
					display: none;
				}

				#game-container.playing:not(.paused) #mobile-controls {
					display: block;
					pointer-events: auto;
				}

				.mobile-dpad,
				.mobile-actions {
					position: absolute;
					pointer-events: auto;
					touch-action: none;
					user-select: none;
					-webkit-user-select: none;
					-webkit-tap-highlight-color: transparent;
				}

				.mobile-dpad {
					left: 10px;
					bottom: 10px;
					display: grid;
					grid-template-columns: repeat(3, 40px);
					grid-template-rows: repeat(3, 40px);
					gap: 0px;
				}

				.mobile-actions {
					right: 14px;
					bottom: 14px;
					display: grid;
					grid-template-columns: repeat(2, 40px);
					gap: 8px;
					width: auto;
				}

				.mobile-btn {
					border: none;
					border-radius: 16px;
					background: rgba(255, 255, 255, 0.14);
					color: #fff;
					font-weight: bold;
					font-size: 16px;
					box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
					backdrop-filter: blur(4px);
					-webkit-backdrop-filter: blur(4px);
				}

				.mobile-btn:active {
					transform: scale(0.96);
					background: rgba(0, 170, 255, 0.35);
				}

				.center-btn {
					opacity: 0;
					pointer-events: none;
				}

				.action-btn {
					height: 40px;
					width: 40px;
					margin: 2px;
					font-size: 14px;
					padding: 0 0px;
				}
			}
		</style>
	</head>
	<body>
		<div id="game-container">
			<div id="start-screen">
				<div class="title-wrapper">
					<img src="roomsicon.jpg" alt="Icon" class="title-icon" onerror="this.style.display='none'">
					<h1>ROOMS</h1>
				</div>
				<div class="menu-buttons">
					<button class="btn" id="start-btn">开始游戏</button>
					<button class="btn sub-btn" onclick="showModal('rules')">游戏规则</button>
					<button class="btn sub-btn" onclick="showModal('intro')">游戏介绍</button>
				</div>
			</div>
			<div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
				<button class="btn sub-btn" id="name-btn" onclick="openNameModal()">加载玩家名中...</button>
			</div>
			<div id="name-modal" class="modal" style="display:none;">
				<div class="modal-content" style="width: 350px; text-align: center;">
					<h3 style="color: #0af; margin-top: 0;">更改玩家名称</h3>
					<input type="text" id="name-input" placeholder="输入玩家名称..."
						style="width: 80%; padding: 10px; margin: 15px 0; background: #333; border: 1px solid #0af; color: white; border-radius: 20px; outline: none;">

			function shuffleArray(arr) {
				for (let i = arr.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[arr[i], arr[j]] = [arr[j], arr[i]];
				}
				return arr;

			function spawnEnemiesForRoom(r) {
				r.enemies = [];
				if (r.id === 0 || (difficulty % 5 === 0)) return;
				let targetCount = Math.min(30, 1 + Math.floor(difficulty / 3) + Math.floor(Math.random() * 4));
				let counts = {
					zombie: 0,
					skeleton: 0,
					fast: 0,
					bomb: 0,
					swift: 0
				};
				if (difficulty >= 11) {
					counts.bomb = Math.min(3, Math.floor(difficulty / 4));
					counts.fast = Math.min(4, Math.floor(difficulty / 3));
					counts.skeleton = Math.min(6, Math.floor(difficulty / 2));
					counts.swift = Math.random() < 0.15 ? 1 : 0;
					counts.zombie = Math.max(0, targetCount - counts.bomb - counts.fast - counts.skeleton - counts.swift);
				} else if (difficulty >= 7) {
					counts.bomb = Math.min(3, Math.floor(difficulty / 4));
					counts.fast = Math.min(4, Math.floor(difficulty / 3));
					counts.skeleton = Math.min(6, Math.floor(difficulty / 2));
					counts.zombie = Math.max(0, targetCount - counts.bomb - counts.fast - counts.skeleton);
				} else if (difficulty >= 4) {
					counts.fast = 1;
					counts.skeleton = 2;
					counts.zombie = Math.max(3, targetCount - 3);
				} else {
					counts.skeleton = 1;
					counts.zombie = Math.max(1, targetCount - 1);
				}
				const enemyList = [];
				for (let i = 0; i < counts.zombie; i++) enemyList.push(Zombie);
				for (let i = 0; i < counts.skeleton; i++) enemyList.push(Skeleton);
				for (let i = 0; i < counts.fast; i++) enemyList.push(FastEnemy);
				for (let i = 0; i < counts.bomb; i++) enemyList.push(BombEnemy);
				for (let i = 0; i < counts.swift; i++) enemyList.push(SwiftEnemy);
				shuffleArray(enemyList);
				let eliteBudget = Math.max(0, Math.floor(targetCount / 4));
				for (let i = 0; i < enemyList.length; i++) {
					let isElite = false;
					if (eliteBudget > 0) {
						isElite = true;
						eliteBudget--;
					} else if (difficulty >= 4 && Math.random() < 0.15) {
						isElite = true;
					}
					const Type = enemyList[i];
					r.enemies.push(new Type(r, canvas.width / 2 + (Math.random() - 0.5) * 600, canvas.height / 2 + (Math
						.random() - 0.5) * 400, isElite));
				}
			}

			function initLevel() {
				rooms = [];
				player.lastRoom = null;
				trans.active = false;
				deathTrans.active = false;
				projectiles = [];
				keys = {};
				updateUI();
				if (difficulty % 5 === 0) {
					let supplyRoom = new Room(0);
					supplyRoom.x = 0;
					supplyRoom.y = 0;
					supplyRoom.placed = true;
					supplyRoom.visited = true;
					supplyRoom.doors.push({
						side: 'top',
						target: new Room(-1),
						isGoal: true
					});
					supplyRoom.items.push({
						x: canvas.width / 2 - 80,
						y: canvas.height / 2
					}, {
						x: canvas.width / 2,
						y: canvas.height / 2
					}, {
						x: canvas.width / 2 + 80,
						y: canvas.height / 2
					});
					rooms.push(supplyRoom);
					player.room = rooms[0];
					player.x = canvas.width / 2;
					player.y = canvas.height / 2 + 150;
					return;
				}
				const numRooms = Math.min(200, Math.floor(difficulty / 2) + 5);
				for (let i = 0; i < numRooms; i++) rooms.push(new Room(i));
				let connected = [rooms[0]],
					remaining = rooms.slice(1);
				rooms[0].x = 0;
				rooms[0].y = 0;
				rooms[0].placed = true;
				rooms[0].visited = true;

				function positionTaken(x, y) {
					return rooms.some(r => r.placed && r.x === x && r.y === y);
				}
				while (remaining.length > 0) {
					let validOrigins = connected.filter(r => {
						const sides = [
							['top', 0, -1],
							['bottom', 0, 1],
							['left', -1, 0],
							['right', 1, 0]
						];
						return sides.some(s => !positionTaken(r.x + s[1], r.y + s[2]));
					});
					if (validOrigins.length === 0) break;
					let from = validOrigins[Math.floor(Math.random() * validOrigins.length)];
					let to = remaining.pop();
					const possibleSides = [
						['top', 0, -1],
						['bottom', 0, 1],
						['left', -1, 0],
						['right', 1, 0]
					].filter(s => !positionTaken(from.x + s[1], from.y + s[2]));
					let chosen = possibleSides[Math.floor(Math.random() * possibleSides.length)];
					let sideFrom = chosen[0];
					to.x = from.x + chosen[1];
					to.y = from.y + chosen[2];
					to.placed = true;
					let sideTo = {
						top: 'bottom',
						bottom: 'top',
						left: 'right',
						right: 'left'
					} [sideFrom];
					from.doors.push({
						side: sideFrom,
						target: to
					});
					to.doors.push({
						side: sideTo,
						target: from
					});
					connected.push(to);
				}
				player.room = rooms[0];
				player.x = canvas.width / 2;
				player.y = canvas.height / 2;
				let maxDist = -1,
					goalRoom = null;
				rooms.forEach(r => {
					let d = Math.abs(r.x) + Math.abs(r.y);
					if (d > maxDist) {
						maxDist = d;
						goalRoom = r;
					}
				});
				const avSides = ['top', 'bottom', 'left', 'right'].filter(s => !goalRoom.doors.map(d => d.side).includes(s));
				if (avSides.length > 0) goalRoom.doors.push({
					side: avSides[0],
					target: new Room(-1),
					isGoal: true
				});
				rooms.forEach(r => {
					spawnEnemiesForRoom(r);
					r.generateGold();
				});
			}

			function applyUpgradesToPlayer() {
				const up = stats.upgrades;
				player.atkHearts = upgradeConfig.atkPower[up.atkPower];
				player.atkCooldownMax = upgradeConfig.atkSpeed[up.atkSpeed];
				player.atkRange = upgradeConfig.atkRange[up.atkRange];

				player.ultCooldownMax = upgradeConfig.ultSpeed[up.ultSpeed];

				player.knockbackForce = upgradeConfig.knockback[up.knockback];

				player.speed = upgradeConfig.speed[up.speed];
				player.hearts = Math.min(stats.currentHearts ?? player.maxHearts, player.maxHearts);
			}

			function update() {
				if (!gameStarted || isPaused) return;
				if (gameState === 'ending') {
					updateEnding();
					return;
				}
				if (deathTrans.active) {
					if (deathTrans.state === 1) {
						deathTrans.alpha += 0.02;
						if (deathTrans.alpha >= 1) {
							deathTrans.alpha = 1;
							deathTrans.state = 2;
							deathTrans.timer = 90;
						}
					} else if (deathTrans.state === 2) {
						deathTrans.timer--;
						if (deathTrans.timer <= 0) {
							score = 0;
							stats.deaths++;
							checkAchievements();
							saveStats();
							respawnSameLevel();
							deathTrans.state = 3;
						}
					} else if (deathTrans.state === 3) {
						deathTrans.alpha -= 0.05;
						if (deathTrans.alpha <= 0) {
							deathTrans.alpha = 0;
							deathTrans.state = 0;
							deathTrans.active = false;
							updateUI();
						}
					}
					return;
				}
				if (levelTrans.active) {
					if (levelTrans.state === 1) {
						levelTrans.alpha += 0.05;
						if (levelTrans.alpha >= 1) {
							levelTrans.alpha = 1;
							levelTrans.state = 2;
							levelTrans.timer = 60;
						}
					} else if (levelTrans.state === 2) {
						levelTrans.timer--;
						if (levelTrans.timer <= 0) {
							difficulty++;
							score += 30;
							submitRankIfNeeded('levelComplete');
							if (difficulty > stats.maxLevel) {
								stats.maxLevel = difficulty;
								saveStats();
							}
							checkAchievements();
							if (difficulty === 20) {
								levelTrans.active = false;
								levelTrans.state = 0;
								levelTrans.alpha = 0;
								startEnding();
							} else {
								initLevel();
							}
							levelTrans.state = 3;
						}
					} else if (levelTrans.state === 3) {
						levelTrans.alpha -= 0.05;
						if (levelTrans.alpha <= 0) {
							levelTrans.alpha = 0;
							levelTrans.state = 0;
							levelTrans.active = false;
							updateUI();
						}
					}
					return;
				}
				if (trans.active) {
					trans.progress += 0.05;
					if (trans.progress >= 1) {
						trans.active = false;
						player.lastRoom = trans.fromRoom;
						player.room = trans.toRoom;
						player.room.visited = true;
						player.x = trans.pEndX;
						player.y = trans.pEndY;
						player.roomTransitionFrames = 40;
						player.room.enemyDelay = 30;
						projectiles = [];
					} else {
						let ease = trans.progress;
						player.x = trans.pStartX + (trans.pEndX - trans.pStartX) * ease;
						player.y = trans.pStartY + (trans.pEndY - trans.pStartY) * ease;
					}
					return;
				}
				if (player.hearts <= 0 && !deathTrans.active) {
					stopBgm();
					playSfx(dieAudio);
					deathTrans.active = true;
					deathTrans.state = 1;
					deathTrans.alpha = 0;
					return;
				}
				if (player.roomTransitionFrames > 0) player.roomTransitionFrames--;
				if (player.room.enemyDelay > 0) player.room.enemyDelay--;
				player.room.items = player.room.items.filter(item => {
					if (Math.hypot(player.x - item.x, player.y - item.y) < PLAYER_SIZE) {
						if (player.hearts < player.maxHearts) player.hearts++;
						playSfx(heartAudio);
						stats.currentHearts = player.hearts;
						saveStats();
						score += 10;
						updateUI();
						return false;
					}
					return true;
				});
				player.room.gold = player.room.gold.filter(g => {
					if (Math.hypot(player.x - g.x, player.y - g.y) < PLAYER_SIZE) {
						score += 5;
						goldCount += 1;
						playSfx(coinAudio);
						updateUI();
						stats.totalGold++;
						saveStats();
						checkAchievements();
						return false;
					}
					return true;
				});
				player.dx = player.dy = 0;
				if (!isCmdMode) {
					if (keys['arrowup'] || keys['w'] || mobileHold.up) player.dy = -PLAYER_SPEED;
					if (keys['arrowdown'] || keys['s'] || mobileHold.down) player.dy = PLAYER_SPEED;
					if (keys['arrowleft'] || keys['a'] || mobileHold.left) player.dx = -PLAYER_SPEED;
					if (keys['arrowright'] || keys['d'] || mobileHold.right) player.dx = PLAYER_SPEED;
				}
				if (player.knockback.frames > 0) {
					player.x += player.knockback.x * (player.knockback.frames / 20);
					player.y += player.knockback.y * (player.knockback.frames / 20);
					player.knockback.frames--;
				} else {
					player.x += player.dx;
					player.y += player.dy;
				}
				player.room.obstacles.forEach(ob => {
					let res = checkCircleRectCollision({
						x: player.x,
						y: player.y,
						size: PLAYER_SIZE
					}, ob);
					if (res.hit) {
						player.x += res.nx * res.overlap;
						player.y += res.ny * res.overlap;
					}
				});
				applyBounds(player, PLAYER_SIZE);
				if (player.dx !== 0 || player.dy !== 0) {
					let len = Math.sqrt(player.dx * player.dx + player.dy * player.dy);
					player.lastMove = {
						dx: player.dx / len,
						dy: player.dy / len
					};
				}
				projectiles = projectiles.filter(p => {
					if (p.room !== player.room) return false;
					p.x += p.vx;
					p.y += p.vy;
					if (Math.hypot(p.x - player.x, p.y - player.y) < PLAYER_SIZE / 2) {
						damagePlayer(p.vx / PROJECTILE_SPEED, p.vy / PROJECTILE_SPEED, 1);
						return false;
					}
					return (p.x > 0 && p.x < canvas.width && p.y > 0 && p.y < canvas.height);
				});
				if (player.roomTransitionFrames <= 0) {
					for (const door of player.room.doors) {
						let doorX = canvas.width / 2,
							doorY = canvas.height / 2;
						switch (door.side) {
							case 'top':
								doorY = (canvas.height - ROOM_HEIGHT) / 2;
								break;
							case 'bottom':
								doorY = (canvas.height + ROOM_HEIGHT) / 2;
								break;
							case 'left':
								doorX = (canvas.width - ROOM_WIDTH) / 2;
								break;
							case 'right':
								doorX = (canvas.width + ROOM_WIDTH) / 2;
								break;
						}
						if (Math.abs(player.x - doorX) < PLAYER_SIZE && Math.abs(player.y - doorY) < PLAYER_SIZE) {
							if (player.room.enemies.length > 0 && door.target !== player.lastRoom) continue;
							if (door.isGoal) {
								if (!levelTrans.active) {
									playSfx(winAudio);
									levelTrans.active = true;
									levelTrans.state = 1;
									levelTrans.alpha = 0;
								}
							} else {
								trans.active = true;
								trans.progress = 0;
								trans.fromRoom = player.room;
								trans.toRoom = door.target;
								trans.pStartX = player.x;
								trans.pStartY = player.y;
								const offset = 80;
								switch (door.side) {
									case 'top':
										trans.offsetX = 0;
										trans.offsetY = canvas.height;
										trans.pEndX = canvas.width / 2;
										trans.pEndY = (canvas.height + ROOM_HEIGHT) / 2 - offset;
										break;
									case 'bottom':
										trans.offsetX = 0;
										trans.offsetY = -canvas.height;
										trans.pEndX = canvas.width / 2;
										trans.pEndY = (canvas.height - ROOM_HEIGHT) / 2 + offset;
										break;
									case 'left':
										trans.offsetX = canvas.width;
										trans.offsetY = 0;
										trans.pEndX = (canvas.width + ROOM_WIDTH) / 2 - offset;
										trans.pEndY = canvas.height / 2;
										break;
									case 'right':
										trans.offsetX = -canvas.width;
										trans.offsetY = 0;
										trans.pEndX = (canvas.width - ROOM_WIDTH) / 2 + offset;
										trans.pEndY = canvas.height / 2;
										break;
								}
							}
							break;
						}
					}
				}
				if (player.attacking && player.attackCooldown <= 0) {
					player.attackCooldown = 30;
					player.swordFrames = 10;
					playSfx(hitAudio);
					player.room.enemies.forEach(e => {
						if (e.dying) return;
						let dx = e.x - player.x,
							dy = e.y - player.y,
							len = Math.sqrt(dx * dx + dy * dy);
						if (len <= PLAYER_SIZE + SWORD_LENGTH && ((dx / len) * player.lastMove.dx + (dy / len) * player
								.lastMove.dy) > 0.4) {
							e.hearts -= 2.5;
							e.knockback.x = dx / len * 12;
							e.knockback.y = dy / len * 12;
							e.knockback.frames = 15;
							checkEnemyDeath(e);
						}
					});
					player.attacking = false;
				}
				if (player.ulting && player.ultCooldown <= 0) {
					player.ulting = false;
					player.ultCooldown = 600;
					player.ultFrames = 20;
					playSfx(bighitAudio);
					player.room.enemies.forEach(e => {
						if (e.dying) return;
						let dx = e.x - player.x,
							dy = e.y - player.y,
							len = Math.hypot(dx, dy);
						if (len <= PLAYER_ULT_RANGE) {
							e.hearts -= 4;
							e.knockback.x = (dx / len) * 20;
							e.knockback.y = (dy / len) * 20;
							e.knockback.frames = 25;
							checkEnemyDeath(e);
						}
					});
				}
				if (player.attackCooldown > 0) player.attackCooldown--;
				if (player.swordFrames > 0) player.swordFrames--;
				if (player.hitCooldown > 0) player.hitCooldown--;
				if (player.ultCooldown > 0) player.ultCooldown--;
				if (player.ultFrames > 0) player.ultFrames--;
				player.room.enemies.forEach(e => e.update());
			}
			class Room {
				constructor(id) {
					this.id = id;
					this.doors = [];
					this.visited = false;
					this.placed = false;
					this.enemies = [];
					this.items = [];
					this.gold = [];
					this.obstacles = [];
					this.x = 0;
					this.y = 0;
					this.enemyDelay = 0;
					this.flag = {
						active: false,
						x: 0,
						y: 0
					};
					this.generateObstacles();
				}
				generateObstacles() {
					if (this.id === 0) return;
					const count = 4 + Math.floor(Math.random() * 5);
					const minX = (canvas.width - ROOM_WIDTH) / 2 + 80,
						maxX = (canvas.width + ROOM_WIDTH) / 2 - 140;
					const minY = (canvas.height - ROOM_HEIGHT) / 2 + 80,
						maxY = (canvas.height + ROOM_HEIGHT) / 2 - 140;
					for (let i = 0; i < count; i++) {
						let ox, oy, valid = false,
							attempts = 0;
						while (!valid && attempts < 20) {
							ox = minX + Math.random() * (maxX - minX);
							oy = minY + Math.random() * (maxY - minY);
							const centerX = canvas.width / 2,
								centerY = canvas.height / 2,
								safeZone = 150;
							if (Math.abs(ox - centerX + 30) > safeZone && Math.abs(oy - centerY + 30) > safeZone) valid =
								true;
							attempts++;
						}
						if (valid) this.obstacles.push({
							x: ox,
							y: oy,
							w: 60,

					if (this.room.enemyDelay > 0) return true;
					if (this.knockback.frames > 0) {
						this.x += this.knockback.x * (this.knockback.frames / 20);

			function damagePlayer(nx, ny, amount = 1, force = false) {
				if (player.hitCooldown > 0 && !force) return;
				player.hearts = Math.max(0, player.hearts - amount);
				const knock = amount >= 4 ? 14 : 10;
				player.knockback.x = nx * knock;
				player.knockback.y = ny * knock;
				player.knockback.frames = amount >= 4 ? 20 : 15;
				player.hitCooldown = amount >= 4 ? 70 : 60;
				stats.currentHearts = player.hearts;
				saveStats();
			}

			function damageAllInRadius(room, cx, cy, radius, amount, source = null, includeSource = false, forcePlayer = false) {
				if (player.room === room) {
					let pdx = player.x - cx,
						pdy = player.y - cy,
						pdist = Math.hypot(pdx, pdy);
					if (pdist <= radius) damagePlayer(pdx / (pdist || 1), pdy / (pdist || 1), amount, forcePlayer);
				}
				room.enemies.slice().forEach(e => {
					if (!includeSource && e === source) return;
					if (e.dying) return;
					let dx = e.x - cx,
						dy = e.y - cy,
						dist = Math.hypot(dx, dy);
					if (dist <= radius) {
						e.hearts -= amount;
						e.knockback.x = dx / (dist || 1) * 12;
						e.knockback.y = dy / (dist || 1) * 12;
						e.knockback.frames = 15;
						checkEnemyDeath(e);
					}
				});
			}

			function checkEnemyDeath(e) {
				if (e.hearts <= 0 && !e.dying) {
					e.dying = true;
					let gain = 0;
					if (e.type === "zombie") gain = 10;
					else if (e.type === "skeleton") gain = 15;
					else if (e.type === "fast") gain = 20;
					else if (e.type === "bomb") gain = 15;
					else if (e.type === "swift") gain = 5;
					if (e.isElite) gain += 5;
					score += gain;
					updateUI();
					stats.totalKills++;
					checkAchievements();
					saveStats();
					if (e.guaranteedHeartDrop) e.room.items.push({
						x: e.x,
						y: e.y
					});
					else if (Math.random() < (e.isElite ? 0.3 : 0.15)) e.room.items.push({
						x: e.x,
						y: e.y
					});
				}
			}

			function applyBounds(obj, size) {
				const left = (canvas.width - ROOM_WIDTH) / 2 + size / 2,
					right = left + ROOM_WIDTH - size;
				const top = (canvas.height - ROOM_HEIGHT) / 2 + size / 2,
					bottom = top + ROOM_HEIGHT - size;
				obj.x = Math.max(left, Math.min(right, obj.x));
				obj.y = Math.max(top, Math.min(bottom, obj.y));
			}

			function checkCircleRectCollision(circle, rect) {
				let closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
				let closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
				let dx = circle.x - closestX,
					dy = circle.y - closestY;
				let distSq = (dx * dx) + (dy * dy);
				let radius = (circle.size || ENEMY_SIZE) / 2;
				if (distSq < radius * radius) {
					let dist = Math.sqrt(distSq);
					if (dist === 0) return {
						hit: true,
						nx: 0,
						ny: -1,
						overlap: radius
					};
					return {
						hit: true,
						nx: dx / dist,
						ny: dy / dist,
						overlap: radius - dist
					};
				}
				return {
					hit: false
				};
			}

			function drawHeart(ctx, x, y, size, color) {
				ctx.fillStyle = color;
				ctx.beginPath();
				ctx.moveTo(x, y + size / 4);
				ctx.bezierCurveTo(x, y - size / 4, x - size / 2, y - size / 4, x - size / 2, y + size / 4);
				ctx.bezierCurveTo(x - size / 2, y + size / 2, x, y + size * 0.75, x, y + size);
				ctx.bezierCurveTo(x, y + size * 0.75, x + size / 2, y + size / 2, x + size / 2, y + size / 4);
				ctx.bezierCurveTo(x + size / 2, y - size / 4, x, y - size / 4, x, y + size / 4);
				ctx.fill();
			}

			function roundRect(ctx, x, y, w, h, r) {
				ctx.beginPath();
				ctx.moveTo(x + r, y);
				ctx.arcTo(x + w, y, x + w, y + h, r);
				ctx.arcTo(x + w, y + h, x, y + h, r);
				ctx.arcTo(x, y + h, x, y, r);
				ctx.arcTo(x, y, x + w, y, r);
				ctx.closePath();
			}

					return;

				if (e.key === 'Escape') {
					isPaused = !isPaused;
					pauseMenu.style.display = isPaused ? 'flex' : 'none';
					if (isPaused) {
						stopBgm();
						document.getElementById('game-container').classList.add('paused');
					} else {
						startBgm();
						document.getElementById('game-container').classList.add('playing');
						document.getElementById('game-container').classList.remove('paused');
					}
					return;
				}
				if (isPaused || levelTrans.active || deathTrans.active) return;
				if (!keys[k] && k === ' ' && player.attackCooldown <= 0 && !trans.active) player.attacking = true;
				if (!keys[k] && k === 'shift' && player.ultCooldown <= 0 && !trans.active) player.ulting = true;
				if (!keys[k] && (k === 'f')) toggleFlag();
				keys[k] = true;
			});
			document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

			function handleCommand(cmd) {
				let parts = cmd.split(' ');
				if (parts[0] === 'd') {
					difficulty = parseInt(parts[1]) || difficulty;
					if (difficulty === 20) {
						startEnding();
					} else {
						initLevel();
					}
				} else if (parts[0] === 'h') {
					player.maxHearts = player.hearts = parseInt(parts[1]) || player.maxHearts;
					updateUI();
					saveStats();
				} else if (parts[0] === 'c') {
					let amount = parseInt(parts[1]) || 0;
					amount = Math.max(0, Math.min(99999999, amount));
					stats.totalGold = goldCount = amount;
					updateUI();
					saveStats();
					submitRankIfNeeded('指令修改金币');
					if (document.getElementById('rank-modal').style.display === 'flex') {
						renderRankList(currentRankTab);
					}
				}
			}

			function draw() {
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				if (!gameStarted) return;
				if (gameState === 'ending') {
					drawEnding();
					return;
				}
				if (trans.active) {
					let ease = trans.progress;
					ctx.save();
					ctx.translate(trans.offsetX * ease, trans.offsetY * ease);
					trans.fromRoom.draw(ctx);
					trans.fromRoom.enemies.forEach(e => e.draw(ctx));
					ctx.restore();
					ctx.save();
					ctx.translate((trans.offsetX * ease) - trans.offsetX, (trans.offsetY * ease) - trans.offsetY);
					trans.toRoom.draw(ctx);
					trans.toRoom.enemies.forEach(e => e.draw(ctx));
					ctx.restore();
				} else {
					player.room.draw(ctx);
					player.room.enemies.forEach(e => e.draw(ctx));
					projectiles.forEach(p => {
						ctx.fillStyle = "white";
						ctx.beginPath();
						ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
						ctx.fill();
					});
				}
				ctx.fillStyle = '#f55';
				ctx.beginPath();
				ctx.arc(player.x, player.y, PLAYER_SIZE / 2, 0, Math.PI * 2);
				ctx.fill();
				drawPlayerEyes(ctx, player);
				if (player.swordFrames > 0) {
					let dx = player.lastMove.dx,
						dy = player.lastMove.dy,
						thrust = SWORD_LENGTH * (1 - Math.abs(player.swordFrames - 5) / 5);
					ctx.strokeStyle = 'white';
					ctx.lineWidth = 6;
					ctx.lineCap = 'round';
					ctx.beginPath();
					ctx.moveTo(player.x + dx * (PLAYER_SIZE / 2), player.y + dy * (PLAYER_SIZE / 2));
					ctx.lineTo(player.x + dx * (PLAYER_SIZE / 2 + thrust), player.y + dy * (PLAYER_SIZE / 2 + thrust));
					ctx.stroke();
				}
				if (player.ultFrames > 0) {
					ctx.save();
					ctx.strokeStyle = 'cyan';
					ctx.lineWidth = 4;
					let radius = PLAYER_SIZE / 2 + SWORD_LENGTH * (1 - player.ultFrames / 20) + 15;
					ctx.beginPath();
					ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
					ctx.stroke();
					ctx.restore();
				}
				for (let i = 0; i < player.maxHearts; i++) {
					drawHeart(ctx, 40 + (i % 15) * 35, 35 + Math.floor(i / 15) * 35, 25, i < player.hearts ? '#ff2e2e' : '#333');
				}
				const barW = 120,
					barH = 14;
				ctx.fillStyle = 'rgba(255,255,255,0.1)';
				roundRect(ctx, 30, canvas.height - 40, barW, barH, 7);
				ctx.fill();
				if (player.attackCooldown <= 0) {
					ctx.fillStyle = '#4CAF50';
					roundRect(ctx, 30, canvas.height - 40, barW, barH, 7);
					ctx.fill();
				} else {
					ctx.fillStyle = '#888';
					roundRect(ctx, 30, canvas.height - 40, barW * (1 - player.attackCooldown / 30), barH, 7);
					ctx.fill();
				}
				ctx.fillStyle = 'rgba(255,255,255,0.1)';
				roundRect(ctx, 170, canvas.height - 40, barW, barH, 7);
				ctx.fill();
				if (player.ultCooldown <= 0) {
					ctx.fillStyle = '#0ff';
					roundRect(ctx, 170, canvas.height - 40, barW, barH, 7);
					ctx.fill();
				} else {
					ctx.fillStyle = '#888';
					roundRect(ctx, 170, canvas.height - 40, barW * (1 - player.ultCooldown / 600), barH, 7);
					ctx.fill();
				}
				if (levelTrans.active) {
					ctx.fillStyle = `rgba(0, 0, 0, ${levelTrans.alpha})`;
					ctx.fillRect(0, 0, canvas.width, canvas.height);
					ctx.fillStyle = `rgba(255, 255, 255, ${levelTrans.alpha})`;
					ctx.font = "bold 50px Arial";
					ctx.textAlign = "center";
					ctx.fillText(levelTrans.state < 3 ? ((difficulty + 1) % 5 === 0 ? "补给站" : `FLOOR ${difficulty+1}`) :
						`FLOOR ${difficulty}`, canvas.width / 2, canvas.height / 2);
				}
				if (deathTrans.active) {
					ctx.fillStyle = `rgba(120, 0, 0, ${deathTrans.alpha})`;
					ctx.fillRect(0, 0, canvas.width, canvas.height);
					ctx.fillStyle = `rgba(255, 255, 255, ${deathTrans.alpha})`;
					ctx.font = "bold 80px Arial";
					ctx.textAlign = "center";
					ctx.fillText("YOU DIED", canvas.width / 2, canvas.height / 2 - 40);
					ctx.font = "bold 40px Arial";
					ctx.fillText(`TOTAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 60);
				}
			}

			function drawMinimap() {
				if (!gameStarted || gameState !== 'playing') return;
				mctx.clearRect(0, 0, mini.width, mini.height);
				if (rooms.length === 0) return;
				let minX = Infinity,
					maxX = -Infinity,
					minY = Infinity,
					maxY = -Infinity;
				rooms.forEach(r => {
					if (r.x < minX) minX = r.x;
					if (r.x > maxX) maxX = r.x;
					if (r.y < minY) minY = r.y;
					if (r.y > maxY) maxY = r.y;
				});
				const mapW = maxX - minX + 1,
					mapH = maxY - minY + 1,
					padding = 20;
				const cellSize = Math.min((mini.width - padding * 2) / mapW, (mini.height - padding * 2) / mapH);
				const offsetX = (mini.width - mapW * cellSize) / 2,
					offsetY = (mini.height - mapH * cellSize) / 2;
				rooms.forEach(r => {
					const rx = offsetX + (r.x - minX) * cellSize,
						ry = offsetY + (r.y - minY) * cellSize,
						ds = cellSize * 0.8;
					mctx.fillStyle = r === player.room ? '#f55' : (r.visited ? '#4CAF50' : '#555');
					mctx.fillRect(rx, ry, ds, ds);
					if (r.flag.active) {
						mctx.fillStyle = 'yellow';
						mctx.beginPath();
						mctx.arc(rx + ds / 2, ry + ds / 2, ds * 0.3, 0, Math.PI * 2);
						mctx.fill();
					}
				});
			}

			function drawPlayerEyes(ctx, player) {
				const centerX = player.x;
				const centerY = player.y;
				const radius = PLAYER_SIZE / 2;
				const eyeRadius = radius * 0.25;
				const pupilRadius = eyeRadius * 0.5;
				const eyeSpacing = radius * 0.4;
				const eyeY = centerY - radius * 0.2;
				const leftEyeX = centerX - eyeSpacing;
				const rightEyeX = centerX + eyeSpacing;
				const dirX = player.lastMove.dx;
				const dirY = player.lastMove.dy;
				const offset = radius * 0.08;
				const pupilX = dirX * offset;
				const pupilY = dirY * offset;
				ctx.fillStyle = '#fff';
				ctx.beginPath();
				ctx.arc(leftEyeX, eyeY, eyeRadius, 0, Math.PI * 2);
				ctx.fill();
				ctx.beginPath();
				ctx.arc(rightEyeX, eyeY, eyeRadius, 0, Math.PI * 2);
				ctx.fill();
				ctx.fillStyle = '#000';
				ctx.beginPath();
				ctx.arc(leftEyeX + pupilX, eyeY + pupilY, pupilRadius, 0, Math.PI * 2);
				ctx.fill();
				ctx.beginPath();
				ctx.arc(rightEyeX + pupilX, eyeY + pupilY, pupilRadius, 0, Math.PI * 2);
				ctx.fill();
			}

			const TEXTDB_KEY = 'zhujingqiroomsrank';
			const TEXTDB_READ_URL = `https://textdb.online/${TEXTDB_KEY}`;
			const TEXTDB_WRITE_URL = 'https://api.textdb.online/update/';
			let rankData = {
				score: [],
				gold: []
			};
			let rankLoaded = false;
			let rankLoading = false;
			let currentRankTab = 'score';

			function getSafePlayerName() {
				return (stats.playerName || 'Player').trim().replace(/[<>]/g, '').slice(0, 20) || 'Player';
			}

			function normalizeRankData(data) {
				const base = {
					score: [],
					gold: []
				};
				if (!data || typeof data !== 'object') return base;
				for (const type of ['score', 'gold']) {
					if (!Array.isArray(data[type])) continue;
					base[type] = data[type]
						.filter(x => x && typeof x === 'object')
						.map(x => ({
							name: String(x.name || 'Player').trim().slice(0, 20) || 'Player',
							value: Number(x.value || 0)
						}))
						.filter(x => Number.isFinite(x.value));
				}
				return base;
			}

			function sortRank(type) {
				rankData[type].sort((a, b) => {
					if (b.value !== a.value) return b.value - a.value;
					return (a.t || 0) - (b.t || 0);
				});
				if (rankData[type].length > 100) rankData[type] = rankData[type].slice(0, 100);
			}

			async function loadRankData() {
				if (rankLoading) return rankData;
				rankLoading = true;
				try {
					const res = await fetch(TEXTDB_READ_URL, {
						cache: 'no-store'
					});
					if (!res.ok) throw new Error(`read failed: ${res.status}`);
					const text = await res.text();
					let parsed = null;
					try {
						parsed = JSON.parse(text);
					} catch {
						parsed = null;
					}
					rankData = normalizeRankData(parsed);
					sortRank('score');
					sortRank('gold');
					rankLoaded = true;
				} catch (err) {
					console.warn('读取排行榜失败：', err);
				}
				rankLoading = false;
				return rankData;
			}
			async function saveRankData() {
				if (!rankData || !Array.isArray(rankData.score) || !Array.isArray(rankData.gold)) {
					console.warn("排行榜数据结构错误，无法上传！");
					return;
				}
				sortRank('score');
				sortRank('gold');
				const body = new URLSearchParams();
				body.set('key', TEXTDB_KEY);
				body.set('value', JSON.stringify(rankData));
				const res = await fetch(TEXTDB_WRITE_URL, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded'
					},
					body
				});
				if (!res.ok) {
					throw new Error(`save failed: ${res.status}`);
				}
			}

			function upsertRankEntry(type, name, value) {
				name = String(name || 'Player').trim().replace(/[<>]/g, '').slice(0, 20) || 'Player';
				value = Number(value || 0);
				if (!Number.isFinite(value)) return false;
				if (!name || name.trim() === "") return false;
				const list = rankData[type];
				const idx = list.findIndex(x => x.name === name);
				if (idx === -1) {
					list.push({
						name,
						value
					});
					sortRank(type);
					return true;
				}
				if (type === 'score') {
					if (value > list[idx].value) {
						list[idx].value = value;
						sortRank(type);
						return true;
					}
					return false;
				}
				if (list[idx].value !== value) {
					list[idx].value = value;
					sortRank(type);
					return true;
				}
				return false;
			}
			async function submitRankIfNeeded(reason = '') {
				const name = getSafePlayerName();
				let changed = false;
				if (score > 0) {
					changed = upsertRankEntry('score', name, score) || changed;
				}
				if (goldCount > 0) {
					changed = upsertRankEntry('gold', name, goldCount) || changed;
				}
				if (!changed) return;
				try {
					await saveRankData();
					stats.lastRankSubmit = {
						score,
						gold: goldCount,
						t: Date.now(),
						reason
					};
					saveStats();
				} catch (err) {
					console.warn('保存排行榜失败：', err);
				}
			}

			function renderRankList(type) {
				const list = document.getElementById('rank-list');
				const status = document.getElementById('rank-status');
				if (!list || !status) return;
				const arr = rankData[type] || [];
				const title = type === 'score' ? '最高分排行' : '金币排行';
				const unit = type === 'score' ? '分' : '金币';
				if (!arr.length) {
					list.innerHTML = `<div style="padding:12px;opacity:.8;">暂无数据</div>`;
					status.innerText = `${title} · 0 人`;
					return;
				}
				list.innerHTML = arr.map((item, i) => `
		<div style="
			display:grid;
			grid-template-columns: 48px 1fr auto;
			gap:10px;
			align-items:center;
			padding:10px 8px;
			border-bottom:1px solid rgba(255,255,255,.08);
		">
			<div>#${i + 1}</div>
			<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.name}</div>
			<div>${item.value} ${unit}</div>
		</div>
	`).join('');
				status.innerText = `${title} · ${Math.min(arr.length, 50)} 人`;
			}

			function switchRankTab(type) {
				currentRankTab = type;
				const sBtn = document.getElementById('rank-tab-score');
				const gBtn = document.getElementById('rank-tab-gold');
				if (sBtn && gBtn) {
					sBtn.style.opacity = type === 'score' ? '1' : '0.6';
					gBtn.style.opacity = type === 'gold' ? '1' : '0.6';
				}
				renderRankList(type);
			}
			async function openRankModal() {
				const modal = document.getElementById('rank-modal');
				if (!modal) return;
				modal.style.display = 'flex';
				const status = document.getElementById('rank-status');
				if (status) status.innerText = '正在加载...';
				await loadRankData();
				switchRankTab(currentRankTab);
			}
			window.addEventListener('blur', () => {
				Object.keys(mobileHold).forEach(k => mobileHold[k] = false);
				keys = {};
			});

			function gameLoop() {
				update();
				draw();
				drawMinimap();
				requestAnimationFrame(gameLoop);
			}
			gameLoop();
		</script>
	</body>
</html>
