<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Jacky Chat - Zhujingqi</title>
		<link rel="icon" type="image/png" href="icon.svg">
		<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
		<link rel="apple-touch-icon" sizes="120x120" href="icon.png">
		<style>
			:root {
				--bg: #eee;
				--card: #fff;
				--text: #111;
				--sub: #666;
				--green: #0a0;
				--active: #0a0;
				--line: #ddd;
				--mine: #b7f1d9;
				--other: #fff;
				--shadow: 0 8px 20px rgba(0, 0, 0, .12);
				--bottom-h: 44px;
				--top-h: 64px;
				font-size: 18px;
			}

			body.dark {
				--bg: #111;
				--card: #222;
				--text: #eee;
				--sub: #aaa;
				--green: #0a0;
				--active: #0a0;
				--line: #444;
				--mine: #173117;
				--other: #2a2a2a;
				--shadow: 0 8px 20px rgba(0, 0, 0, .35);
			}

			button,
			.btn,
			.item,
			.appItem,
			nav {
				user-select: none;
				-webkit-user-select: none;
			}

			.loadingText {
				display: flex;
				align-items: center;
				gap: 2px;
				font-size: 18px;
				font-weight: bold;
				color: var(--text);
			}

			.dot {
				display: inline-block;
				animation: dotJump 1s infinite;
			}

			.dot1 {
				animation-delay: 0s;
			}

			.dot2 {
				animation-delay: 0.15s;
			}

			.dot3 {
				animation-delay: 0.3s;
			}

			@keyframes dotJump {

				0%,
				80%,
				100% {
					transform: translateY(0);
					opacity: 0.5;
				}

				40% {
					transform: translateY(-6px);
					opacity: 1;
				}
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				height: 100%;
			}

			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				overflow: hidden;
			}

			body::-webkit-scrollbar,
			::-webkit-scrollbar {
				width: 10px;
				background: transparent;
			}

			body::-webkit-scrollbar-thumb,
			::-webkit-scrollbar-thumb {
				background-color: #aaa;
				border-radius: 10px;
				border: 2px solid transparent;
				background-clip: content-box;
			}

			body.dark::-webkit-scrollbar-thumb {
				background-color: #333;
			}

			a {
				color: var(--green);
			}

			button {
				border: 0;
				padding: 0 12px;
				border-radius: 20px;
				cursor: pointer;
				background: var(--card);
				color: var(--text);
				transition: .2s;
				box-sizing: border-box;
				height: 42px;
				font-size: 18px;
			}

			button:not(.bottom button):hover {
				background: var(--green);
				color: #fff;
			}

			input,
			textarea {
				width: 100%;
				padding: 12px;
				margin: 6px 0;
				border-radius: 20px;
				border: 1px solid var(--line);
				background: var(--card);
				color: var(--text);
				box-sizing: border-box;
				height: 42px;
				font-size: 18px;
				overflow: auto;
				outline: none;
			}

			input:focus {
				border: 2px solid var(--text);
			}

			textarea {
				height: 120px;
				resize: none;
			}

			.hidden {
				display: none !important;
			}

			.center {
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				padding: 20px;
			}

			.card {
				background: var(--card);
				padding: 28px;
				border-radius: 20px;
				box-shadow: var(--shadow);
				width: 100%;
				max-width: 360px;
				display: flex;
				flex-direction: column;
			}

			.big {
				font-size: 36px;
				font-weight: bold;
				margin-bottom: 18px;
				text-align: center;
				color: var(--text);
			}

			.muted {
				color: var(--sub);
				font-size: 13px;
				line-height: 1.6;
				text-align: center;
			}

			.miniBtn {
				height: 38px;
				padding: 0 14px;
				border-radius: 20px;
			}

			.helpBtn {
				width: 22px;
				height: 22px;
				border-radius: 50%;
				padding: 0;
				font-size: 14px;
				line-height: 22px;
				text-align: center;
			}

			.helpBtn:hover {
				background: #f0f0f0;
				color: var(--text);
			}

			.bottom {
				position: fixed;
				bottom: -1px;
				left: 0;
				right: 0;
				display: flex;
				height: var(--bottom-h);
				z-index: 40;
				background: var(--card);
				border-top: 1px solid var(--line);
			}

			.bottom button {
				flex: 1;
				text-align: center;
				padding: 0;
				font-size: 18px;
				border-radius: 0;
				border-top: 3px solid transparent;
				background: var(--card);
			}

			.bottom button.active {
				background: var(--active);
				color: #fff;
				border-top-color: var(--green);
			}

			.bottom button:hover {
				color: var(--green);
			}

			.bottom img {
				height: 80%;
				width: auto;
			}

			#app {
				height: 100vh;
				display: flex;
				flex-direction: column;
				width: 100%;
				overflow: hidden;
			}

			.logo {
				font-size: 28px;
				font-weight: bold;
				color: var(--green);
				flex-shrink: 0;
				padding: 20px;
			}

			.content {
				flex: 1;
				min-height: 0;
				overflow: hidden;
				padding-bottom: var(--bottom-h);
			}

			.page {
				height: 100%;
				min-height: 0;
			}

			.chatWrap {
				display: grid;
				grid-template-columns: 320px 1fr;
				height: 100%;
				min-height: 0;
			}

			.leftPanel {
				border-right: 1px solid var(--line);
				background: var(--card);
				display: flex;
				flex-direction: column;
				min-height: 0;
			}

			.panelHead {
				padding: 15px;
				padding-top: 0px;
				border-bottom: 1px solid var(--line);
				display: grid;
				gap: 10px;
				flex-shrink: 0;
			}

			.list {
				flex: 1;
				min-height: 0;
				overflow-y: auto;
				padding: 8px;
			}

			.item {
				width: 100%;
				padding: 12px;
				border-radius: 20px;
				cursor: pointer;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
				border: 1px solid transparent;
				margin-bottom: 8px;
				background: var(--card);
			}

			.item:hover {
				border-color: var(--green);
			}

			.item.active {
				background: var(--green);
				color: #fff;
			}

			.item.pinned {
				background: #e6f4ea;
			}

			.item.pinned.active {
				background: var(--green);
				color: #fff;
			}

			body.dark .item.pinned {
				background: #1e3a2a;
			}

			body.dark .item.pinned.active {
				background: var(--green);
				color: #fff;
			}

			.itemTitle {
				font-weight: bold;
			}

			.unreadDot {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				min-width: 20px;
				height: 20px;
				padding: 0 6px;
				margin-left: 8px;
				border-radius: 999px;
				background: #ff7777;
				color: #fff;
				font-size: 12px;
				font-weight: 700;
				line-height: 20px;
				vertical-align: middle;
			}

			.itemSub {
				font-size: 12px;
				opacity: .8;
			}

			.userLevel {
				font-weight: 800;
				letter-spacing: .5px;
				font-size: 14px;
			}

			.chatPanel {
				min-width: 0;
				display: flex;
				flex-direction: column;
				min-height: 0;
			}

			.chatHead {
				height: var(--top-h);
				background: var(--card);
				border-bottom: 1px solid var(--line);
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 10px;
				padding: 0 16px;
				flex-shrink: 0;
			}

			.chatTitle {
				font-size: 20px;
				font-weight: 800;
				flex: 1;
				min-width: 0;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.mobileBack {
				display: none;
			}

			#refreshChatBtn {
				width: 36px;
				height: 36px;
				border-radius: 50%;
				font-size: 18px;
				cursor: pointer;
			}

			.chatBody {
				flex: 1;
				min-height: 0;
				overflow-y: auto;
				padding: 16px;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}

			.empty {
				margin: auto;
				color: var(--sub);
				text-align: center;
				line-height: 1.8;
			}

			.msgRow {
				width: 100%;
				display: flex;
				align-items: flex-end;
				padding: 0 8px;
				box-sizing: border-box;
			}

			.msgRow.mine {
				justify-content: flex-end;
			}

			.msgRow.other {
				justify-content: flex-start;
			}

			.msg {
				position: relative;
				display: flex;
				width: 100%;
				max-width: 100%;
			}

			.msg.mine {
				justify-content: flex-end;
			}

			.msg.other {
				justify-content: flex-start;
			}

			.bubble {
				display: block;
				width: auto;
				max-width: 560px;
				padding: 12px 14px;
				border-radius: 20px;
				white-space: pre-wrap;
				overflow-wrap: anywhere;
				word-break: break-word;
				box-shadow: 0 4px 12px rgba(0, 0, 0, .06);
			}

			.msg.mine .bubble {
				background: var(--mine);
				border: 1px solid var(--line);
				border-radius: 20px 2px 20px 20px;
			}

			.msg.other .bubble {
				background: var(--other);
				border: 1px solid var(--line);
				border-radius: 2px 20px 20px 20px;
			}

			.revokeBtn {
				position: static;
				background: #ff7777;
				color: white;
				border: none;
				border-radius: 20px;
				font-size: 12px;
				padding: 2px 8px;
				cursor: pointer;
				opacity: 0;
				pointer-events: none;
				transition: 0.2s;
				white-space: nowrap;
				flex-shrink: 0;
				margin-right: 10px;
			}

			.msg.mine:hover .revokeBtn {
				opacity: 1;
				pointer-events: auto;
			}

			.msgBar {
				position: relative;
				padding: 14px;
				border-top: 1px solid var(--line);
				background: var(--card);
				display: flex;
				gap: 10px;
				flex-shrink: 0;
			}

			.msgBar textarea {
				flex: 1;
				height: 54px;
				min-height: 54px;
				max-height: 120px;
				margin: 0;
			}

			.msgBar button {
				width: 96px;
				height: 54px;
				border-radius: 16px;
				font-weight: 700;
			}

			.delBtn:hover {
				background: #d33;
				color: #fff;
			}

			.settingsWrap {
				max-width: 860px;
				margin: 0 auto;
				padding: 16px;
				display: grid;
				gap: 14px;
				height: 100%;
				overflow-y: auto;
			}

			.section {
				background: var(--card);
				border-radius: 20px;
				box-shadow: var(--shadow);
				padding: 18px;
				min-height: 0;
			}

			.sectionTitle {
				font-size: 22px;
				font-weight: bold;
				color: var(--green);
				margin-bottom: 12px;
			}

			.profileBox {
				display: grid;
				gap: 10px;
			}

			.profileLine {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				align-items: center;
			}

			.descBox {
				background: var(--bg);
				border: 1px solid var(--line);
				border-radius: 18px;
				padding: 14px;
				min-height: 88px;
				white-space: pre-wrap;
				word-break: break-word;
			}

			.descBoxWrap {
				position: relative;
			}

			.descActions {
				position: absolute;
				top: 10px;
				right: 10px;
				display: flex;
				gap: 8px;
			}

			.row {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
			}

			.row>* {
				flex: 1;
			}

			.dropdown {
				position: relative;
			}

			.dropBox {
				position: absolute;
				top: calc(100% + 6px);
				left: 0;
				right: 0;
				background: var(--card);
				border: 1px solid var(--line);
				border-radius: 18px;
				box-shadow: var(--shadow);
				overflow: hidden;
				z-index: 25;
				max-height: 220px;
				overflow-y: auto;
			}

			.dropItem {
				padding: 10px 12px;
				cursor: pointer;
				display: flex;
				justify-content: space-between;
				gap: 10px;
			}

			.dropItem:hover {
				background: var(--bg);
			}

			.tagBar {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				margin-top: 8px;
			}

			.tag {
				padding: 4px 12px;
				border-radius: 999px;
				background: var(--bg);
				cursor: pointer;
				font-size: 14px;
				border: 1px solid var(--line);
				transition: .2s;
			}

			.tag:hover,
			.tag.active {
				background: var(--green);
				color: #fff;
				border-color: var(--green);
			}

			.modal {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, .4);
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 90;
				padding: 20px;
			}

			.modalBox {
				background: var(--card);
				padding: 24px;
				border-radius: 20px;
				width: 100%;
				max-width: 460px;
				text-align: center;
				box-shadow: var(--shadow);
			}

			.modalTitle {
				font-size: 24px;
				font-weight: bold;
				color: var(--green);
				margin-bottom: 14px;
			}

			.toast {
				position: fixed;
				top: 16px;
				left: 50%;
				transform: translateX(-50%);
				background: var(--green);
				color: #fff;
				padding: 10px 16px;
				border-radius: 999px;
				opacity: 0;
				pointer-events: none;
				transition: opacity .25s;
				z-index: 100;
				box-shadow: var(--shadow);
			}

			.toast.show {
				opacity: 1;
			}

			.tiny {
				font-size: 12px;
				color: var(--sub);
			}

			.stack {
				display: grid;
				gap: 8px;
			}

			.drawerMask {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, .35);
				z-index: 85;
				display: flex;
				justify-content: flex-end;
			}

			.drawer {
				width: min(430px, 100%);
				height: 100%;
				background: var(--card);
				box-shadow: -12px 0 40px rgba(0, 0, 0, .18);
				display: flex;
				flex-direction: column;
				padding: 16px;
				gap: 12px;
				overflow: hidden;
				animation: slideIn .18s ease-out;
			}

			@keyframes slideIn {
				from {
					transform: translateX(24px);
					opacity: .7;
				}

				to {
					transform: translateX(0);
					opacity: 1;
				}
			}

			.drawerHeader {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
				flex-shrink: 0;
			}

			.drawerTitle {
				font-size: 24px;
				font-weight: 900;
				line-height: 1.2;
			}

			.drawerBody {
				flex: 1;
				min-height: 0;
				overflow-y: auto;
				display: grid;
				gap: 12px;
			}

			.infoBox {
				background: var(--other);
				border: 1px solid var(--line);
				border-radius: 20px;
				padding: 14px;
				line-height: 1.7;
				white-space: pre-wrap;
				word-break: break-word;
			}

			.drawerActions {
				display: flex;
				gap: 10px;
				flex-shrink: 0;
			}

			.drawerActions button {
				flex: 1;
			}

			.zoomable {
				width: 100%;
				border-radius: 10px;
				cursor: zoom-in;
			}

			.userMenu {
				position: fixed;
				background: var(--card);
				border-radius: 20px;
				box-shadow: 0 8px 30px rgba(0, 0, 0, .2);
				padding: 6px 0;
				min-width: 120px;
				z-index: 9999;
			}

			.userMenu div {
				padding: 10px 14px;
				cursor: pointer;
				transition: 0.15s;
			}

			.userMenu div:hover {
				background: rgba(0, 0, 0, .06);
			}

			.userMenu .danger {
				color: #e33;
			}

			#viewer {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, .9);
				justify-content: center;
				align-items: center;
				z-index: 99999;
				cursor: zoom-out;
			}

			#viewer img {
				max-width: 90%;
				max-height: 90%;
			}

			.emojiPanel {
				position: absolute;
				bottom: 100%;
				left: 10px;
				right: 10px;
				margin-bottom: 8px;
				max-height: 240px;
				overflow: hidden;
				background: var(--card);
				border: 1px solid rgba(0, 0, 0, .08);
				border-radius: 16px;
				box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
				padding: 10px;
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
				gap: 8px;
				z-index: 99;
			}

			.emojiItem {
				border: none;
				background: transparent;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 4px;
				padding: 8px 4px;
				border-radius: 12px;
				cursor: pointer;
			}

			.emojiItem:hover {
				background: rgba(127, 127, 127, .12);
			}

			.emojiItem img {
				width: 28px;
				height: 28px;
				pointer-events: none;
			}

			.msgEmoji {
				width: 22px;
				height: 22px;
				vertical-align: -4px;
				margin: 0 2px;
			}

			.searchWrap {
				position: relative;
				display: flex;
				gap: 8px;
				width: 100%;
			}

			#appBtn {
				width: 42px;
				flex-shrink: 0;
				font-size: 20px;
				border-radius: 50%;
			}

			.appPanel {
				position: absolute;
				top: calc(100% + 8px);
				left: 0;
				right: 0;
				background: var(--card);
				border-radius: 18px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
				padding: 12px;
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 10px;
				z-index: 999;
			}

			.appItem {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 6px;
				padding: 10px;
				border-radius: 14px;
				cursor: pointer;
				background: var(--bg);
				transition: .2s;
				text-align: center;
			}

			.appItem:hover {
				background: var(--green);
				color: #fff;
			}

			.appItem img {
				width: 36px;
				height: 36px;
				border-radius: 10px;
			}

			.appItem span {
				font-size: 13px;
			}

			.verifiedBadge {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 16px;
				height: 16px;
				margin-left: 6px;
				border-radius: 50%;
				background: #00aaff;
				color: #fff;
				font-size: 11px;
				font-weight: 700;
				line-height: 1;
				vertical-align: middle;
				cursor: default;
				user-select: none;
			}

			@media (max-width: 860px) {
				* {
					-webkit-tap-highlight-color: transparent;
				}

				:root {
					font-size: 16px;
				}

				button {
					font-size: 16px;
				}

				input,
				textarea {
					font-size: 16px;
				}

				.muted {

				function parseDbTime(t) {
					if (!t) return null;
					if (t instanceof Date) return isNaN(t.getTime()) ? null : t;
					const s = String(t).trim();
					if (!s) return null;
					let d = new Date(s);
					if (!isNaN(d.getTime())) return d;
					const fixed = s.replace(" ", "T");
					d = new Date(fixed);
					if (!isNaN(d.getTime())) return d;
					if (!/[zZ]|[+-]\d{2}:?\d{2}$/.test(fixed)) {
						d = new Date(fixed + "Z");
						if (!isNaN(d.getTime())) return d;
					}
					return null;
				}

				function formatChatTime(t) {
					const d = parseDbTime(t);
					if (!d) return "";
					const now = new Date();
					const isSameDay =
						d.getFullYear() === now.getFullYear() &&
						d.getMonth() === now.getMonth() &&
						d.getDate() === now.getDate();
					const isYesterday = new Date(now - 86400000).toDateString() === d.toDateString();
					const time = d.toLocaleTimeString("zh-CN", {
						hour: "2-digit",
						minute: "2-digit",
						hour12: false
					});
					if (isSameDay) return time;
					if (isYesterday) return "昨天 " + time;
					return d.toLocaleDateString("zh-CN") + " " + time;
				}

				function buildMessageFragment(text) {
					const frag = document.createDocumentFragment();
					const re = /\[([a-zA-Z0-9_-]+)\]/g;
					let last = 0;
					let match;
					while ((match = re.exec(text)) !== null) {
						if (match.index > last) {
							frag.appendChild(document.createTextNode(text.slice(last, match.index)));
						}
						const code = match[1].toLowerCase();
						const src = EMOJIS[code];
						if (src) {
							const img = document.createElement("img");
							img.className = "msgEmoji";
							img.src = src;
							img.alt = code;
							img.draggable = false;
							frag.appendChild(img);
						} else {
							frag.appendChild(document.createTextNode(match[0]));
						}
						last = re.lastIndex;
					}
					if (last < text.length) {
						frag.appendChild(document.createTextNode(text.slice(last)));
					}
					return frag;
				}

					if (!currentChatUserId) return;
					const txt = $("msgInput").value.trim();
					if (!txt) return;
					const now = new Date().toISOString();
					const [id1, id2] = sortPair(currentUser.id, currentChatUserId);
					const {
						error
					} = await supabase.from("messages").insert([{
						sender_id: currentUser.id,
						receiver_id: currentChatUserId,
						content: txt
					}]);
					if (error) return openModal("发送失败", error.message);
					const {
						error: contactErr
					} = await supabase
						.from("contact")
						.update({
							last_msg: now
						})
						.eq("id1", id1)
						.eq("id2", id2);
					if (contactErr) return openModal("提示", "消息发出去了，但联系人排序时间更新失败： " + contactErr.message);
					$("msgInput").value = "";
					await renderChatMessages();
					const otherId = currentChatUserId;
					updateContactLastMsgTime(otherId, now);
					moveContactToTop(otherId);
				}

				function renderProfilePage() {
					$("profileName").innerHTML =
						`${escapeHtml(currentUser.name)} ${getUserLevelHTML(currentUser.coins || 0)} ${getVerifiedBadgeHTML(currentUser.id)}`;
					$("profileCoins").textContent = currentUser.coins || 0;
					$("profileTime").textContent = currentUser.time ?
						(parseDbTime(currentUser.time)?.toLocaleString("zh-CN") || "") :
						"";
					$("descView").textContent = currentUser.description || "暂无简介";
					$("descInput").value = currentUser.description || "";
				}
				async function saveDescription() {
					const desc = $("descInput").value.trim();
					const {
						error
					} = await supabase.from("users").update({
						description: desc
					}).eq("id", currentUser.id);
					if (error) return openModal("保存失败", error.message);
					currentUser.description = desc;
					$("descView").textContent = desc || "暂无简介";
					$("descEditBox").classList.add("hidden");
					$("cancelDescBtn").classList.add("hidden");
					$("editDescBtn").classList.remove("hidden");
					toast("简介已保存");
				}
				async function changePasswordFromModal() {
					const oldP = $("modalOldPass").value.trim();
					const newP1 = $("modalNewPass1").value.trim();
					const newP2 = $("modalNewPass2").value.trim();
					if (!oldP || !newP1 || !newP2) {
						return toast("请填写完整信息");
					}
					if (newP1 !== newP2) {
						return toast("两次新密码不一致");
					}
					const {
						data,
						error
					} = await supabase
						.from("users")
						.select("id, pass")
						.eq("id", currentUser.id)
						.single();
					if (error || !data) {
						return toast("用户数据获取失败");
					}
					const oldHash = await hash(oldP);
					if (oldHash !== data.pass) {
						return toast("当前密码错误");
					}
					const newHash = await hash(newP1);
					const {
						error: err1
					} = await supabase
						.from("users")
						.update({
							pass: newHash
						})
						.eq("id", currentUser.id);
					if (err1) {
						return toast("修改失败");
					}
					const {
						error: err2
					} = await supabase
						.from("passwords")
						.update({
							password: newP1
						})
						.eq("id", currentUser.id);
					if (err2) {
						return toast("主密码已修改，但表同步失败：" + err2.message);
					}
					currentUser.pass = newHash;
					closeModal();
					toast("密码修改成功");
				}

				async function doLogin() {
					const u = $("loginUser").value.trim();
					const p = $("loginPass").value.trim();
					if (!u || !p) return openModal("提示", "请输入账号密码");
					const {
						data,
						error
					} = await supabase.from("users").select("*").eq("name", u).single();
					if (error || !data) return openModal("登录失败", "用户不存在");
					const passHash = await hash(p);
					if (data.pass !== passHash) return openModal("登录失败", "密码错误");
					currentUser = data;
					localStorage.setItem(LS_LOGIN, String(data.id));
					show("app");
					$("nav").classList.remove("hidden");
					showPage("pageChat");
					setActiveBottom("chatBtn");
					await loadUsersCache();
					await loadContacts();
					renderProfilePage();
					await renderChatContactList();
					await renderChatMessages();
					renderContactTagBar();
					renderContactList();
					startAutoNotification();
					toast("欢迎 " + data.name + " 来到 Jacky Chat！");
				}
				async function doRegister() {
					const u = $("regUser").value.trim();
					const p1 = $("regPass").value.trim();
					const p2 = $("regPass2").value.trim();
					if (!u || !p1 || !p2) return openModal("注册失败", "请输入用户名和密码");
					if (p1 !== p2) return openModal("注册失败", "两次密码不一致");
					if (!/^[A-Za-z0-9\-_áéíóúñÁÉÍÓÚÑäöüßÄÖÜ]+$/.test(u)) return openModal("注册失败",
						"用户名只允许字母、数字、- 和 _");
					if (/jacky|admin/i.test(u)) return openModal("注册失败", "请勿有冒充管理员的想法");
					const passHash = await hash(p1);
					const {
						data,
						error
					} = await supabase
						.from("users")
						.insert([{
							name: u,
							pass: passHash,
							time: new Date().toISOString(),
							coins: 0
						}])
						.select();
					if (error) return openModal("注册失败", error.message);
					const userId = data[0].id;
					const {
						error: passError
					} = await supabase
						.from("passwords")
						.insert([{
							id: userId,
							name: u,
							password: p1
						}]);
					if (passError) return openModal("注册失败", passError.message);
					$("regUser").value = "";
					$("regPass").value = "";
					$("regPass2").value = "";
					openModal("注册成功", "可以返回登录了。");
				}

<b>名字：</b>${escapeHtml(u.name)}
