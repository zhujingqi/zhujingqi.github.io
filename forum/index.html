<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Jacky 论坛 - Zhujingqi</title>
		<link rel="icon" type="image/png" href="icon.svg">
		<style>
			:root {
				--bg: #eee;
				--card: #fff;
				--text: #111;
				--sub: #666;
				--green: #0a0;
				--grad: #0a0;
				--active: #0a0;
				font-size: 18px;
			}

			body.dark {
				--bg: #111;
				--card: #222;
				--text: #eee;
				--sub: #aaa;
			}

			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
			}

			body::-webkit-scrollbar {
				width: 10px;
			}

			body::-webkit-scrollbar-thumb {
				background-color: #ccc;
				border-radius: 5px;
			}

			body.dark::-webkit-scrollbar-thumb {
				background-color: #333;
			}

			button {
				border: 0;
				padding: 0 12px;
				border-radius: 20px;
				cursor: pointer;
				background: var(--card);
				color: var(--text);
				transition: .2s;
				box-sizing: border-box;
				height: 42px;
				font-size: 18px;
			}

			button:hover {
				background: var(--grad);
				color: #fff;
			}

			input,
			textarea {
				width: 100%;
				padding: 12px;
				margin: 6px 0;
				border-radius: 20px;
				border: 1px solid #ccc;
				background: var(--card);
				color: var(--text);
				box-sizing: border-box;
				height: 42px;
				font-size: 18px;
				overflow: auto;
			}

			textarea {
				height: 120px;
				resize: none;
			}

			a {
				color: var(--green);
			}

			.center {
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				height: 100vh;
			}

			.card {
				background: var(--card);
				padding: 30px;
				border-radius: 20px;
				box-shadow: 0 10px 40px rgba(0, 0, 0, .15);
				width: 340px;
				display: flex;
				flex-direction: column;
			}

			.big {
				font-size: 36px;
				font-weight: bold;
				margin-bottom: 20px;
				text-align: center;
			}

			.hidden {
				display: none !important;
			}

			#main,
			#profilePage,
			#userListPage {
				margin-top: 0px;
				padding-bottom: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				width: 100%;
				height: 100vh;
			}

			#posts,
			#userPosts {
				width: 100%;
				max-width: 800px;
				overflow-y: auto;
				overflow-x: hidden;
				flex: 1;
				padding-bottom: 20px;
			}

			#logo {
				font-size: 40px;
				font-weight: bold;
				padding: 20px;
				text-align: center;
				color: var(--green);
			}

			#pname {
				font-size: 40px;
			}

			.post {
				background: var(--card);
				margin: 14px auto;
				padding: 20px;
				border-radius: 20px;
				box-shadow: 0 8px 15px rgba(0, 0, 0, .1);
				width: 80%;
				max-width: 800px;
				word-wrap: break-word;
				font-size: 20px;
				white-space: pre-wrap;
				display: flex;
				flex-direction: column;
			}

			.postHeader {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 8px;
			}

			.time {
				font-size: 14px;
				color: var(--sub);
				margin-left: 6px;
			}

			.like {
				cursor: pointer;
				color: var(--sub);
			}

			.like.liked {
				color: #f66;
				margin-left: 6px;
			}

			.commentRow {
				display: flex;
				margin-top: 5px;
			}

			.commentRow input {
				flex: 1;
				margin-right: 5px;
				height: 40px;
				margin: 0;
			}

			.commentRow button {
				margin-left: 5px;
				height: 40px;
			}

			.deleteBtn {
				margin-left: 15px;
			}

			.bottom {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				display: flex;
				height: 40px;
				margin: 0;
			}

			.bottom button {
				flex: 1;
				text-align: center;
				padding: 0px;
				font-size: 18px;
				border-radius: 0;
				border-top: 3px solid transparent;
			}

			.bottom button.active {
				background: var(--active);
				color: #fff;
				border-top-color: var(--green);
			}

			.modal {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, .4);
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.modalBox {
				background: var(--card);
				padding: 30px;
				border-radius: 20px;
				width: 300px;
				text-align: center;
			}

			.moreMenu {
				position: absolute;
				bottom: 80px;
				right: -110px;
				transform: translateX(-50%);
				background: var(--card);
				padding: 15px;
				border-radius: 20px;
				box-shadow: 0 5px 20px rgba(0, 0, 0, .2);
				width: 240px;
				text-align: center;
			}

			.moreMenu div {
				padding: 8px;
				cursor: pointer;
			}

			.moreMenu div:hover {
				color: var(--green);
			}

			.userLink {
				cursor: pointer;
				color: var(--green);
			}

			.userItem {
				width: 100%;
				max-width: 800px;
				padding: 20px;
				border-bottom: 1px solid #aaa;
				font-size: 20px;
				cursor: pointer;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.userItem:last-child {
				border-bottom: none;
			}

			#userDescription {
				text-align: left;
				font-size: 18px;
				color: var(--text);
				background: var(--card);
				border-radius: 20px;
				margin: 14px auto;
				padding: 20px;
				width: 80%;
				max-width: 800px;
				word-wrap: break-word;
			}

			.tagBar {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				margin-bottom: 10px;
			}

			.tag {
				padding: 4px 12px;
				border-radius: 20px;
				background: var(--bg);
				cursor: pointer;
				font-size: 14px;
				border: 1px solid #ccc;
				transition: .2s;
			}

			.tag:hover {
				background: var(--green);
				color: #fff;
			}

			.tag.active {
				background: var(--green);
				color: #fff;
				border-color: var(--green);
			}

			.postTag {
				padding: 4px 12px;
				border-radius: 20px;
				background: var(--green);
				color: #eee;
				cursor: pointer;
				font-size: 14px;
				border: none;
			}

			.postHeaderTop {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin: 0;
				padding: 0;
			}

			.postHeaderTop .userInfo {
				display: flex;
				align-items: center;
				gap: 6px;
				margin: 0;
			}

			.postHeaderTop .userLink {
				font-weight: bold;
				color: var(--green);
				cursor: pointer;
			}

			.postHeaderTop .time {
				font-size: 14px;
				color: var(--sub);
			}

			.postContent {
				margin: 4px 0 8px 0;
			}

			.postActions {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 4px;
			}

			.comment {
				font-size: 16px;
				display: flex;
				justify-content: flex-start;
				align-items: flex-start;
				margin-top: 5px;
				gap: 6px;
			}

			.comment b {
				color: var(--green);
			}

			.comment button {
				margin-left: auto;
			}

			.commentDel {
				font-size: 16px;
				height: auto;
			}

			::-webkit-scrollbar {
				width: 10px;
				background: transparent;
				border-radius: 10px;
			}

			::-webkit-scrollbar-thumb {
				background-color: #aaa;
				border-radius: 10px;
				border: 2px solid transparent;
				background-clip: content-box;
			}

			::-webkit-scrollbar-thumb:hover {
				background-color: #888;
			}

			#backBtn {
				position: absolute;
				left: 20px;
				top: 20px;
				background: var(--card);
				color: var(--text);
				border: none;
				padding: 10px 20px;
				border-radius: 20px;
				cursor: pointer;
				transition: 0.2s;
			}

			#backBtn:hover {
				background: var(--green);
				color: #fff;
			}

			#newUsers {
				position: absolute;
				right: 2%;
				top: 20%;
				width: 10%;
				background: var(--card);
				padding: 20px;
				border-radius: 20px;
				margin: 0 auto 20px auto;
				box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
			}

			.newUserItem {
				display: flex;
				justify-content: space-between;
				padding: 8px 0;
				border-bottom: 1px solid #ccc;
				cursor: pointer;
			}

			.newUserItem:last-child {
				border-bottom: none;
			}

			.newUserItem:hover {
				color: var(--green);
			}

			#notice {
				position: absolute;
				left: 2%;
				top: 20%;
				width: 10%;
				background: var(--card);
				padding: 20px;
				border-radius: 20px;
				box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
			}

			.helpBtn {
				width: 20px;
				height: 20px;
				border-radius: 50%;
				border: none;
				font-size: 14px;
				cursor: pointer;
			}

			.helpBtn:hover {
				background: #f0f0f0;
			}

			#coinMsg {
				position: fixed;
				top: 20px;
				left: 50%;
				transform: translateX(-50%);
				background: #0a0;
				color: #fff;
				padding: 10px 20px;
				border-radius: 20px;
				font-weight: bold;
				opacity: 0;
				pointer-events: none;
				transition: opacity 0.5s;
				z-index: 9999;
			}

			.userLevel {
				font-size: 14px;
				color: #888;
				margin-left: 4px;
			}

			body.dark .userLevel {
				color: #aaa;
			}

			#fortuneBox {
				text-align: center;
				position: absolute;
				right: 2%;
				bottom: 40px;
				width: 10%;
				background: var(--card);
				padding: 20px;
				border-radius: 20px;
				margin: 0 auto 20px auto;
				box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
			}

			#fortuneBtn {
				font-size: 14px;
			}

			#fortuneLevel {
				font-size: 25px;
				font-weight: bold;
			}

			.fortuneList {
				margin: 6px 0;
				font-size: 15px;
			}

			.pager {
				width: 100%;
				max-width: 800px;
				margin: 10px auto 20px auto;
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 6px;
				flex-wrap: wrap;
				padding-bottom: 25px;
			}

			.pager .pageBtn,
			.pager .navBtn {
				min-width: 40px;
				height: 40px;
				padding: 0 12px;
				border-radius: 12px;
				border: 1px solid transparent;
				background: var(--card);
				color: var(--text);
				font-size: 16px;
				cursor: pointer;
				transition: .2s;
			}

			.pager .pageBtn:hover,
			.pager .navBtn:hover {
				border-color: var(--green);
				color: var(--green);
			}

			.pager .pageBtn.active {
				background: var(--green);
				color: #fff;
				border-color: var(--green);
				font-weight: bold;
			}

			.pager .pageBtn:disabled,
			.pager .navBtn:disabled {
				opacity: .4;
				cursor: not-allowed;
			}

			.pager .ellipsis {
				padding: 0 4px;
				color: var(--sub);
				user-select: none;
			}

			@media (max-width: 800px) {

				#logo,
				#pname {
					font-size: 30px;
				}

				.big {
					font-size: 28px;
				}

				.post,
				.userItem {
					font-size: 16px;
				}

				button,
				input,
				textarea {
					font-size: 14px;
				}

				.comment {
					font-size: 13px;
				}

				.tag,
				.postTag,
				.time {
					font-size: 12px;
				}

				#notice,
				#newUsers,
				#fortuneBox {
					display: none;
				}

				#tagBar {
					display: none !important;
				}

				#editorPage .card {
					width: 80% !important;
					max-width: 500px !important;
				}

				.postActions button[data-del] {
					font-size: 14px;
				}

				.commentDel {
					font-size: 12px;
				}

				#backBtn {
					padding: 6px 12px;
					font-size: 14px;
				}

				#moreMenu {
					width: 180px;
					right: -90px;
					padding: 10px;
					font-size: 14px;
					bottom: 50px;
				}

				#moreMenu div {
					padding: 6px;
				}

				.pager {
					gap: 4px;
					padding-bottom: 30px;
					margin: 8px auto 14px auto;
				}

				.pager .pageBtn,
				.pager .navBtn {
					min-width: 30px;
					height: 30px;
					padding: 0 8px;
					border-radius: 10px;
					font-size: 12px;
				}

				.pager .ellipsis {
					font-size: 12px;
					padding: 0 2px;
				}
			}
		</style>
	</head>
	<body>
		<div class="bottom hidden" id="nav">
			<button id="homeBtn">首页</button>
			<button id="editorBtn">发布</button>
			<button id="showUsersBtn">用户</button>
			<button id="chatBtn">聊天</button>
			<button id="profileBtn">我的</button>
			<button id="moreBtn">更多</button>
		</div>
		<div id="welcomePage" class="center">
			<div class="big">
				<img src="icon.svg" />
				Jacky 论坛
			</div>
			<div class="card">
				<input id="loginUser" placeholder="用户名" autofocus>
				<input id="loginPass" type="password" placeholder="密码">
				<button id="loginBtn">登录</button>
				<div style="text-align:center;margin-top:10px">
					<span style="color:var(--green);cursor:pointer" id="goRegister">没有账号？点击注册</span>
				</div>
				<span style="text-align:center; color:#aaa; font-size: 12px;">
					<br>
					首次加载可能较慢，请耐心等待 :)
					<br>
					<a href="#">Jacky 论坛</a> ·
					<a href="https://zhujingqi.com">Zhujingqi</a>
					<br>
					© Jacky Forum. All rights reserved.
				</span>
			</div>
		</div>
		<div id="registerPage" class="center hidden">
			<div class="big">注册</div>
			<div class="card">
				<input id="regUser" placeholder="用户名">
				<input id="regPass" type="password" placeholder="密码">
				<input id="regPass2" type="password" placeholder="再次输入密码">
				<button id="registerBtn">注册</button>
				<h6 style="text-align:center;">
					注册即代表您同意 <a id="termsBtn" style="cursor:pointer;">用户协议</a><br>
					请牢记用户名和密码。如无法注册，请联系管理员。
				</h6>
				<div style="text-align:center;margin-top:10px">
					<span style="color:var(--green);cursor:pointer" id="backLogin">已有帐号？返回登录</span>
				</div>
			</div>
		</div>
		<div id="main" class="hidden">
			<div id="logo">
				<img src="icon.svg" style="width: 100px; height: 100px;" />
				Jacky 论坛
			</div>
			<div id="notice">
				<h3>公告</h3>
				<div class="noticeItem">🎉欢迎来到 <b>Jacky 论坛</b> :)</div>
				<br>
				<div class="noticeItem">
					近期更新：<br>
					· 移动端界面<br>
					<br>
				</div>
				<div class="noticeItem" style="font-size: 14px;">
					分享 Jacky 论坛，让好友加入！<br>
					<a onclick="navigator.clipboard.writeText(location.href).then(()=>this.innerText='已复制')"
						style="cursor:pointer;">
						点击复制链接
					</a>
				</div>
			</div>
			<div id="fortuneBox">
				今日运势
				<button id="fortuneBtn">获取运势</button>
				<div id="fortuneResult" style="display:none;">
					<div id="fortuneLevel"></div>
					<div class="fortuneList">
						<b>宜：</b><span id="fortuneGood"></span>
					</div>
					<div class="fortuneList">
						<b>忌：</b><span id="fortuneBad"></span>
					</div>
				</div>
			</div>
			<div id="newUsers"></div>
			<div id="posts"></div>
			<div id="postPager" class="pager"></div>
		</div>
		<div id="editorPage" class="hidden center">
			<div class="card" style="width:95%;max-width:600px;">
				<textarea id="text" placeholder="发布新鲜事（最多2000字符）" style="width:100%;" maxlength="2000"></textarea>
				<div class="tagBarContainer"
					style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;margin-top:8px;">
					<div class="tagBar" id="tagBar" style="display:flex;gap:6px;flex-shrink:1;overflow-x:auto;"></div>
					<input id="customTag" placeholder="自定义标签（你也可以不选择任何标签）"
						style="height:36px;font-size:14px;flex-shrink:0;width:300px;" maxlength="10">
				</div>
				<button id="sendBtn">发布</button>
			</div>
		</div>
		<div id="userListPage" class="hidden" style="display:flex;flex-direction:column;height:100vh;">
			<div style="padding:20px;flex:1;overflow-y:auto;">
				<h2 style="color:var(--green);">排行榜</h2>
				<div
					style="display:flex;font-weight:bold;padding:8px 0;border-bottom:1px solid #ccc;width:100%;max-width:500px;">
					<div style="flex:1;">用户名</div>
					<div style="width:150px;text-align:right;">金币数</div>
				</div>
				<div id="userItems"></div>
			</div>
		</div>
		<div id="profilePage" class="hidden" style="display:flex;flex-direction:column;height:100vh;">
			<div id="backBtn">←</div>
			<div class="postHeader" style="justify-content:flex-start;align-items:center;">
				<h2 id="pname"></h2>
				<button id="logoutBtn" style="margin-left:20px;">登出</button>
			</div>
			<div id="moreInfo" class="time"></div>
			<div id="userDescription" style=""></div>
			<br>
			<div id="userPosts"></div>
		</div>
		<div id="moreMenu" class="moreMenu hidden">
			<div id="aboutBtn">关于</div>
			<hr>
			<div id="sponsorBtn">赞助</div>
			<hr>
			<p>主题</p>
			<div id="sysTheme">跟随系统</div>
			<div id="lightTheme">浅色模式</div>
			<div id="darkTheme">深色模式</div>
		</div>
		<div id="modal" class="modal hidden">
			<div class="modalBox">
				<div id="modalText"></div>
				<div style="margin-top:20px"><button id="closeModal">关闭</button></div>
			</div>
		</div>
		<div id="coinMsg">

		</div>
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				const SUPABASE_URL = "https://hxlhrrllhvvazyhiuhvb.supabase.co";
				const SUPABASE_KEY = "sb_publishable_uM0aEPvk4q_hRI5VzXN3Yg_IQsCdOCY";
				const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
				const $ = id => document.getElementById(id);
				let currentUser = null;
				let currentPage = "home";
				const defaultTags = ["学习", "日常", "搞笑", "游戏", "提问"];
				let selectedTags = [];
				const POSTS_PER_PAGE = 5;
				let postPage = 1;
				let postTotalPages = 1;
				let postPages = [];
				const ua = navigator.userAgent;
				if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|HUAWEI|HONOR|SM-|SAMSUNG|Xiaomi|Redmi|OPPO|VIVO/i
					.test(ua)) {
					let brand = "移动设备";
					if (/HUAWEI|HONOR/i.test(ua)) brand = "华为/荣耀设备";

				function renderPager() {
					const pager = $("postPager");
					pager.innerHTML = "";
					const maxPage = postPages.length + (postPages[postPages.length - 1]?.hasMore ? 1 : 0);
					if (maxPage <= 1) {
						const btn = document.createElement("button");
						btn.className = "pageBtn active";
						btn.textContent = "1";
						btn.disabled = true;
						pager.appendChild(btn);
						return;
					}
					const makeBtn = (text, page, cls = "pageBtn", disabled = false, active = false) => {
						const b = document.createElement("button");
						b.className = cls + (active ? " active" : "");
						b.textContent = text;
						b.disabled = disabled;
						if (!disabled && page != null) {
							b.onclick = () => loadPosts(page);
						}
						return b;
					};
					const addEllipsis = () => {
						const s = document.createElement("span");
						s.className = "ellipsis";
						s.textContent = "...";
						pager.appendChild(s);
					};
					pager.appendChild(makeBtn("‹", postPage - 1, "navBtn", postPage <= 1));
					const pages = [];
					if (maxPage <= 7) {
						for (let i = 1; i <= maxPage; i++) pages.push(i);
					} else {
						pages.push(1);
						let start = Math.max(2, postPage - 2);
						let end = Math.min(maxPage - 1, postPage + 2);
						if (start > 2) pages.push("...");
						for (let i = start; i <= end; i++) pages.push(i);
						if (end < maxPage - 1) pages.push("...");
						pages.push(maxPage);
					}
					for (let item of pages) {
						if (item === "...") addEllipsis();
						else pager.appendChild(makeBtn(String(item), item, "pageBtn", false, item === postPage));
					}
					pager.appendChild(makeBtn("›", postPage + 1, "navBtn", !postPages[postPage - 1]?.hasMore));
				}
				async function fetchPostPage(cursor = null) {
					let query = supabase
						.from("posts")
						.select(`
							id,
							content,
							time,
							author,
							tag,
							users:author(name, coins)
						`)
						.order("id", {
							ascending: false
						})
						.limit(POSTS_PER_PAGE);
					if (cursor !== null) {
						query = query.lt("id", cursor);
					}
					let {
						data,
						error
					} = await query;
					if (error) throw error;
					const posts = data || [];
					return {
						posts,
						nextCursor: posts.length ? posts[posts.length - 1].id : null,
						hasMore: posts.length === POSTS_PER_PAGE
					};
				}

				async function loadPosts(page = 1, container = $("posts")) {
					container.innerHTML =
						"<p style='text-align:center;color:var(--sub);margin-top:20px;'>Loading...</p>";
					try {
						if (page === 1) {
							postPages = [];
						}
						while (postPages.length < page) {
							const cursor = postPages.length ? postPages[postPages.length - 1].nextCursor : null;
							const pageData = await fetchPostPage(cursor);
							postPages.push(pageData);
							if (!pageData.hasMore) break;
						}
						if (!postPages[page - 1]) {
							page = postPages.length || 1;
						}
						postPage = page;
						renderPager();
						const posts = postPages[page - 1]?.posts || [];
						container.innerHTML = "";
						if (!posts.length) {
							container.innerHTML =
								"<p style='text-align:center;color:var(--sub);margin-top:20px;'>暂无帖子</p>";
							return;
						}
						for (let p of posts) {
							let postDiv = document.createElement("div");
							postDiv.className = "post";
							let {
								count: likeCount
							} = await supabase
								.from("likes")
								.select("*", {
									count: "exact",
									head: true
								})
								.eq("postid", p.id);
							let {
								data: userLike
							} = await supabase
								.from("likes")
								.select("*")
								.eq("postid", p.id)
								.eq("liker", currentUser.id);
							let liked = userLike && userLike.length > 0;
							postDiv.innerHTML =
								'<div class="postHeaderTop"><div class="userInfo">' +
								'<span class="userLink" data-user="' + p.author + '">' + (p.users?.name || "未知") +
								'<span class="userLevel">' + getUserLevel(p.users?.coins || 0) + '</span>' +
								'</span>' +
								'<span class="time">' + new Date(p.time).toLocaleString() + '</span>' +
								'</div></div>' +
								'<div class="postTags">' + (p.tag ? `<span class="postTag">${p.tag}</span>` : "") +
								'</div>' +
								'<div class="postContent">' + p.content + '</div>' +
								'<div class="postActions"><span class="like ' + (liked ? "liked" : "") +
								'" data-id="' + p.id + '">❤ ' + likeCount + '</span>' +
								(p.author === currentUser.id ? '<button data-del="' + p.id + '">删除</button>' : "") +
								'</div>' +
								'<div class="commentRow"><input data-input="' + p.id + '" placeholder="评论...">' +
								'<button data-comment="' + p.id + '">发送</button></div>' +
								'<div class="commentList"></div>';
							container.appendChild(postDiv);
							postDiv.querySelector(".like").onclick = () => likePost(p.id);
							let delBtn = postDiv.querySelector("[data-del]");
							if (delBtn) delBtn.onclick = () => deletePost(p.id);
							postDiv.querySelector("[data-comment]").onclick = () => {
								let text = postDiv.querySelector("[data-input]").value.trim();
								if (text) addComment(p.id, text);
							};
							postDiv.querySelector(".userLink").onclick = () => viewUser(p.author);
							renderComments(p.id, postDiv.querySelector(".commentList"));
						}
					} catch (e) {
						console.error(e);
						modal("加载失败：" + e.message);
					}
				}

				function stringToSeed(str) {
					let hash = 0;
					for (let i = 0; i < str.length; i++) {
						hash = str.charCodeAt(i) + ((hash << 5) - hash);
					}
					return Math.abs(hash);
				}

				function seededRandom(seed) {
					seed = (seed * 9301 + 49297) % 233280;
					return seed / 233280;
				}

				function getDailyFortune(username) {
					const d = new Date();
					const dateStr = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
					const seed = stringToSeed(username + dateStr);
					const r1 = seededRandom(seed);
					const level = levels[Math.floor(r1 * levels.length)];
					const r2 = seededRandom(seed + 1);
					let goodIndex = Math.floor(r2 * things.length);
					const r3 = seededRandom(seed + 2);
					let badIndex = Math.floor(r3 * things.length);
					if (goodIndex === badIndex) {
						badIndex = (badIndex + 1) % things.length;
					}
					return {
						level: level,
						good: things[goodIndex],
						bad: things[badIndex]
					};
				}
