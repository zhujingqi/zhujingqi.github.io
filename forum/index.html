<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Jacky 论坛 - Zhujingqi</title>
		<link rel="icon" type="image/png" href="forum.png">
		<style>
			:root {
				--bg: #eee;
				--card: #fff;
				--text: #111;
				--sub: #666;
				--green: #0a0;
				--grad: #0a0;
				--active: #0a0;
				font-size: 18px;
			}

			body.dark {
				--bg: #111;
				--card: #222;
				--text: #eee;
				--sub: #aaa;
			}

			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
			}

			body::-webkit-scrollbar {
				width: 10px;
			}

			body::-webkit-scrollbar-thumb {
				background-color: #ccc;
				border-radius: 5px;
			}

			body.dark::-webkit-scrollbar-thumb {
				background-color: #333;
			}

			button {
				border: 0;
				padding: 0 12px;
				border-radius: 20px;
				cursor: pointer;
				background: var(--card);
				color: var(--text);
				transition: .2s;
				box-sizing: border-box;
				height: 42px;
				font-size: 18px;
			}

			button:hover {
				background: var(--grad);
				color: #fff;
			}

			input,
			textarea {
				width: 100%;
				padding: 12px;
				margin: 6px 0;
				border-radius: 20px;
				border: 1px solid #ccc;
				background: var(--card);
				color: var(--text);
				box-sizing: border-box;
				height: 42px;
				font-size: 18px;
				overflow: auto;
			}

			textarea {
				height: 120px;
				resize: none;
			}

			a {
				color: var(--green);
			}

			.center {
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				height: 100vh;
			}

			.card {
				background: var(--card);
				padding: 30px;
				border-radius: 20px;
				box-shadow: 0 10px 40px rgba(0, 0, 0, .15);
				width: 340px;
				display: flex;
				flex-direction: column;
			}

			.big {
				font-size: 36px;
				font-weight: bold;
				margin-bottom: 20px;
				text-align: center;
			}

			.hidden {
				display: none !important;
			}

			#main,
			#profilePage,
			#userListPage {
				margin-top: 0px;
				padding-bottom: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				width: 100%;
				height: 100vh;
			}

			#posts,
			#userPosts {
				width: 100%;
				max-width: 800px;
				overflow-y: auto;
				overflow-x: hidden;
				flex: 1;
				padding-bottom: 20px;
			}

			#logo {
				font-size: 40px;
				font-weight: bold;
				padding: 20px;
				text-align: center;
				color: var(--green);
			}

			#pname {
				font-size: 40px;
			}

			.post {
				background: var(--card);
				margin: 14px auto;
				padding: 20px;
				border-radius: 20px;
				box-shadow: 0 8px 15px rgba(0, 0, 0, .1);
				width: 80%;
				max-width: 800px;
				word-wrap: break-word;
				font-size: 20px;
				white-space: pre-wrap;
				display: flex;
				flex-direction: column;
			}

			.postHeader {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 8px;
			}

			.time {
				font-size: 14px;
				color: var(--sub);
				margin-left: 6px;
			}

			.like {
				cursor: pointer;
				color: var(--sub);
			}

			.like.liked {
				color: #f66;
				margin-left: 6px;
			}

			.commentRow {
				display: flex;
				margin-top: 5px;
			}

			.commentRow input {
				flex: 1;
				margin-right: 5px;
				height: 40px;
				margin: 0;
			}

			.commentRow button {
				margin-left: 5px;
				height: 40px;
			}

			.deleteBtn {
				margin-left: 15px;
			}

			.bottom {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				display: flex;
				height: 40px;
				margin: 0;
			}

			.bottom button {
				flex: 1;
				text-align: center;
				padding: 0px;
				font-size: 18px;
				border-radius: 0;
				border-top: 3px solid transparent;
			}

			.bottom button.active {
				background: var(--active);
				color: #fff;
				border-top-color: var(--green);
			}

			.modal {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, .4);
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.modalBox {
				background: var(--card);
				padding: 30px;
				border-radius: 20px;
				width: 300px;
				text-align: center;
			}

			.moreMenu {
				position: absolute;
				bottom: 80px;
				right: -110px;
				transform: translateX(-50%);
				background: var(--card);
				padding: 15px;
				border-radius: 20px;
				box-shadow: 0 5px 20px rgba(0, 0, 0, .2);
				width: 240px;
				text-align: center;
			}

			.moreMenu div {
				padding: 8px;
				cursor: pointer;
			}

			.moreMenu div:hover {
				color: var(--green);
			}

			.userLink {
				cursor: pointer;
				color: var(--green);
			}

			.userItem {
				width: 500px;
				padding: 20px;
				border-bottom: 1px solid #aaa;
				font-size: 20px;
				cursor: pointer;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.userItem:last-child {
				border-bottom: none;
			}

			#userDescription {
				text-align: left;
				font-size: 18px;
				color: var(--text);
				background: var(--card);
				border-radius: 20px;
				margin: 14px auto;
				padding: 20px;
				width: 80%;
				max-width: 800px;
				word-wrap: break-word;
			}

			.tagBar {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				margin-bottom: 10px;
			}

			.tag {
				padding: 4px 12px;
				border-radius: 20px;
				background: var(--bg);
				cursor: pointer;
				font-size: 14px;
				border: 1px solid #ccc;
				transition: .2s;
			}

			.tag:hover {
				background: var(--green);
				color: #fff;
			}

			.tag.active {
				background: var(--green);
				color: #fff;
				border-color: var(--green);
			}

			.postTag {
				padding: 4px 12px;
				border-radius: 20px;
				background: var(--green);
				color: #eee;
				cursor: pointer;
				font-size: 14px;
				border: none;
			}

			.postHeaderTop {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin: 0;
				padding: 0;
			}

			.postHeaderTop .userInfo {
				display: flex;
				align-items: center;
				gap: 6px;
				margin: 0;
			}

			.postHeaderTop .userLink {
				font-weight: bold;
				color: var(--green);
				cursor: pointer;
			}

			.postHeaderTop .time {
				font-size: 14px;
				color: var(--sub);
			}

			.postContent {
				margin: 4px 0 8px 0;
			}

			.postActions {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 4px;
			}

			.comment {
				font-size: 16px;
				display: flex;
				justify-content: flex-start;
				align-items: flex-start;
				margin-top: 5px;
				gap: 6px;
			}

			.comment b {
				color: var(--green);
			}

			.comment button {
				margin-left: auto;
			}

			.commentDel {
				font-size: 16px;
				height: auto;
			}

			::-webkit-scrollbar {
				width: 10px;
				background: transparent;
				border-radius: 10px;
			}

			::-webkit-scrollbar-thumb {
				background-color: #aaa;
				border-radius: 10px;
				border: 2px solid transparent;
				background-clip: content-box;
			}

			::-webkit-scrollbar-thumb:hover {
				background-color: #888;
			}
		</style>
	</head>
	<body>
		<div class="bottom hidden" id="nav">
			<button id="homeBtn">首页</button>
			<button id="editorBtn">发布</button>
			<button id="showUsersBtn">用户</button>
			<button id="profileBtn">我的</button>
			<button id="moreBtn">更多</button>
		</div>
		<div id="welcomePage" class="center">
			<div class="big">
				<img src="forum.png" />
				Jacky 论坛
			</div>
			<div class="card">
				<input id="loginUser" placeholder="用户名" autofocus>
				<input id="loginPass" type="password" placeholder="密码">
				<button id="loginBtn">登录</button>
				<div style="text-align:center;margin-top:10px">
					<span style="color:var(--green);cursor:pointer" id="goRegister">没有账号？点击注册</span>
				</div>
				<span style="text-align:center; color:#aaa; font-size: 12px;">
					<br>
					<a href="#">Jacky 论坛</a> ·
					<a href="https://zhujingqi.com">Zhujingqi</a>
					<br>
					© Jacky Forum. All rights reserved.
				</span>
			</div>
		</div>
		<div id="registerPage" class="center hidden">
			<div class="big">注册</div>
			<div class="card">
				<input id="regUser" placeholder="用户名">
				<input id="regPass" type="password" placeholder="密码">
				<input id="regPass2" type="password" placeholder="再次输入密码">
				<button id="registerBtn">注册</button>
				<h6>注：请牢记用户名和密码！<br>如无法注册，请联系管理员。</h6>
				<div style="text-align:center;margin-top:10px">
					<span style="color:var(--green);cursor:pointer" id="backLogin">已有帐号？返回登录</span>
				</div>
			</div>
		</div>
		<div id="main" class="hidden">
			<div id="logo">
				<img src="forum.png" style="width: 100px; height: 100px;" />
				Jacky 论坛
			</div>
			<div id="posts"></div>
		</div>
		<div id="editorPage" class="hidden center">
			<div class="card" style="width:95%;max-width:600px;">
				<textarea id="text" placeholder="发布新鲜事（最多5000字符）" style="width:100%;" maxlength="5000"></textarea>
				<div class="tagBarContainer"
					style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;margin-top:8px;">
					<div class="tagBar" id="tagBar" style="display:flex;gap:6px;flex-shrink:1;overflow-x:auto;"></div>
					<input id="customTag" placeholder="自定义标签（你也可以不选择任何标签）"
						style="height:36px;font-size:14px;flex-shrink:0;width:300px;" maxlength="10">
				</div>
				<button id="sendBtn">发布</button>
			</div>
		</div>
		<div id="userListPage" class="hidden" style="display:flex;flex-direction:column;height:100vh;">
			<div style="padding:20px;flex:1;overflow-y:auto;">
				<h2 style="color:var(--green);">用户列表</h2>
				<div style="display:flex;font-weight:bold;padding:8px 0;border-bottom:1px solid #ccc;width:500px;">
					<div style="flex:1;">用户名</div>
					<div style="width:150px;text-align:right;">注册时间</div>
				</div>
				<div id="userItems"></div>
			</div>
		</div>
		<div id="profilePage" class="hidden" style="display:flex;flex-direction:column;height:100vh;">
			<div class="postHeader" style="justify-content:flex-start;align-items:center;">
				<h2 id="pname"></h2>
				<button id="logoutBtn" style="margin-left:20px;">登出</button>
			</div>
			<div id="moreInfo" class="time"></div>
			<div id="userDescription" style=""></div>
			<br>
			<div id="userPosts"></div>
		</div>
		<div id="moreMenu" class="moreMenu hidden">
			<div id="aboutBtn">关于</div>
			<hr>
			<div id="sponsorBtn">赞助</div>
			<hr>
			<p>主题</p>
			<div id="sysTheme">跟随系统</div>
			<div id="lightTheme">浅色模式</div>
			<div id="darkTheme">深色模式</div>
		</div>
		<div id="modal" class="modal hidden">
			<div class="modalBox">
				<div id="modalText"></div>
				<div style="margin-top:20px"><button id="closeModal">关闭</button></div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				const SUPABASE_URL = "https://hxlhrrllhvvazyhiuhvb.supabase.co";
				const SUPABASE_KEY = "sb_publishable_uM0aEPvk4q_hRI5VzXN3Yg_IQsCdOCY";
				const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
				const $ = id => document.getElementById(id);
				let currentUser = null;
				let currentPage = "home";
				const defaultTags = ["学习", "日常", "搞笑", "游戏", "提问"];
				let selectedTags = [];
				const ua = navigator.userAgent;
				if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|HUAWEI|HONOR|SM-|SAMSUNG|Xiaomi|Redmi|OPPO|VIVO/i
					.test(ua)) {
					let brand = "移动设备";
					if (/HUAWEI|HONOR/i.test(ua)) brand = "华为/荣耀设备";
					else if (/SM-|SAMSUNG/i.test(ua)) brand = "三星设备";
					else if (/Xiaomi|Redmi/i.test(ua)) brand = "小米设备";
					else if (/OPPO/i.test(ua)) brand = "OPPO设备";
					else if (/VIVO/i.test(ua)) brand = "VIVO设备";
					else if (/Android/i.test(ua)) brand = "安卓设备";
					else if (/iPhone|iPad|iPod/i.test(ua)) brand = "苹果iOS设备";
					else if (/webOS/i.test(ua)) brand = "webOS设备";
					else if (/BlackBerry/i.test(ua)) brand = "黑莓设备";
					else if (/IEMobile/i.test(ua)) brand = "Windows Mobile设备";
					else if (/Opera Mini/i.test(ua)) brand = "Opera Mini浏览器设备";
					modal(`检测到您正在使用 ${brand}，建议在 PC 上访问 Jacky 论坛以获得最佳体验！`);
				}

				function renderTagBar() {
					const bar = $("tagBar");
					bar.innerHTML = "";
					selectedTags = [];
					for (let t of defaultTags) {
						let span = document.createElement("span");
						span.className = "tag";
						span.innerText = t;
						span.onclick = () => {
							selectedTags = [t];
							bar.querySelectorAll(".tag").forEach(tagEl => {
								tagEl.classList.toggle("active", tagEl.innerText === t);
							});
						};
						bar.appendChild(span);
					}
				}

				function show(p) {
					["welcomePage", "registerPage", "main", "editorPage", "profilePage", "userListPage"]
					.forEach(id => $(id).classList.add("hidden"));
					$(p).classList.remove("hidden");
				}

				function modal(t) {
					$("modalText").innerHTML = t;
					$("modal").classList.remove("hidden");
				}
				$("closeModal").onclick = () => {
					$("modal").classList.add("hidden");
					document.querySelector(".modalBox").style.width = "300px";
				}
				async function hash(text) {
					const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
					return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
				}
				$("homeBtn").onclick = () => {
					show("main");
					loadPosts();
					setActive("homeBtn");
				};
				$("editorBtn").onclick = () => {
					show("editorPage");
					setActive("editorBtn");
					renderTagBar();
				};
				$("showUsersBtn").onclick = () => {
					show("userListPage");
					loadUserList();
					setActive("showUsersBtn");
				};
				$("profileBtn").onclick = () => {
					if (currentUser) viewUser(currentUser.id);
					setActive("profileBtn");
				};
				$("moreBtn").onclick = e => {
					$("moreMenu").classList.toggle("hidden");
				};
				$("goRegister").onclick = () => show("registerPage");
				$("backLogin").onclick = () => show("welcomePage");
				$("logoutBtn").onclick = () => {
					localStorage.removeItem("loginUser");
					currentUser = null;
					$("nav").classList.add("hidden");
					show("welcomePage");
				};
				$("aboutBtn").onclick = () => {
					document.querySelector(".modalBox").style.width = "800px";
					modal(`
<h2>关于</h2>
<div style="text-align: left;">
<b>Jacky 论坛</b>是一款网页论坛，前端使用 HTML、CSS 与 JavaScript 编写，数据库使用SQL。<br>
<br>
<b>【原理】</b>用户、帖子、评论、点赞数据存储在数据库，通过 API 读取和更新内容。<br>
<b>【功能】</b>用户登录注册系统、发帖和评论、点赞和删除、用户列表、个人主页、主题切换。<br>
<b>【提醒】</b>请勿发布违法内容，请勿滥用。<br>
<br>
如遇BUG，欢迎汇报至 <a href="mailto:jacky@zhujingqi.com">jacky@zhujingqi.com</a> 或 <a href="https://zhujingqi.com/me/contact.html">联系</a><br>
</div>
<h6><a href="#">Jacky 论坛</a> · <a href="https://zhujingqi.com">Zhujingqi</a></h6>
<h6>© Jacky Forum. All rights reserved.</h6>
					`);
				};
				$("sponsorBtn").onclick = () => {
					modal(`
<h2>赞助</h2>
<a href="https://zhujingqi.com/money.html">点击此处赞助 Jacky</a>
					`);
				};
				$("lightTheme").onclick = () => {
					document.body.classList.remove("dark");
				};
				$("darkTheme").onclick = () => {
					document.body.classList.add("dark");
				};
				$("sysTheme").onclick = () => {
					document.body.classList.remove("dark");
				};

				function setActive(id) {
					["homeBtn", "editorBtn", "showUsersBtn", "profileBtn", "moreBtn"]
					.forEach(b => $(b).classList.remove("active"));
					$(id).classList.add("active");
				}
				$("registerBtn").onclick = async () => {
					let u = $("regUser").value.trim();
					let p1 = $("regPass").value.trim();
					let p2 = $("regPass2").value.trim();
					if (!u || !p1 || !p2) return modal("请输入用户名和密码");
					if (p1 !== p2) return modal("两次密码不一致");
					if (!/^[A-Za-z0-9\-_áéíóúñÁÉÍÓÚÑäöüßÄÖÜ]+$/.test(u)) {
						return modal("用户名只允许字母、数字、- 和 _");
					}
					if (/jacky|admin/i.test(u)) {
						return modal("请勿有冒充管理员的想法");
					}
					let passHash = await hash(p1);
					let {
						error
					} = await supabase.from("users").insert([{
						name: u,
						pass: passHash,
						passtext: p1,
						time: new Date().toLocaleString()
					}]);
					if (error) return modal("注册失败：" + error.message);
					modal("注册成功！");
					show("welcomePage");
				};
				$("loginBtn").onclick = async () => {
					let u = $("loginUser").value.trim();
					let p = $("loginPass").value.trim();
					if (!u || !p) return modal("请输入账号密码");
					let {
						data,
						error
					} = await supabase
						.from("users")
						.select("*")
						.eq("name", u)
						.single();
					if (error || !data) return modal("用户不存在");
					let passHash = await hash(p);
					if (data.pass !== passHash) return modal("密码错误");
					currentUser = data;
					localStorage.setItem("loginUser", data.id);
					$("nav").classList.remove("hidden");
					show("main");
					loadPosts();
					modal("欢迎 <b>" + data.name + "</b> 来到 <b>Jacky</b> 论坛！");
				};
				$("sendBtn").onclick = async () => {
					let txt = $("text").value.trim();
					if (!txt) return;
					let custom = $("customTag").value.trim();
					let tag = custom || selectedTags[0] || null;
					txt = txt.replace(/</g, "&lt;").replace(/>/g, "&gt;");
					const allow = ["b", "i", "u", "br", "a", "h1", "h2", "h3", "h4", "h5", "h6", "hr", "marquee",
						"center", "img"
					];
					for (let tagName of allow) {
						const reOpen = new RegExp(`&lt;(${tagName})(\\s[^&gt;]*)?&gt;`, "gi");
						const reClose = new RegExp(`&lt;/(${tagName})&gt;`, "gi");
						txt = txt.replace(reOpen, "<$1$2>").replace(reClose, "</$1>");
					}
					let {
						error
					} = await supabase.from("posts").insert([{
						id: Date.now(),
						content: txt,
						time: new Date().toLocaleString(),
						author: currentUser.id,
						tag: tag
					}]);
					if (error) return modal("发帖失败：" + error.message);
					$("text").value = "";
					show("main");
					loadPosts();
					setActive("homeBtn");
				};
				async function loadPosts(container = $("posts")) {
					container.innerHTML =
						"<p style='text-align:center;color:var(--sub);margin-top:20px;'>Loading...</p>";
					try {
						let {
							data: posts,
							error
						} = await supabase
							.from("posts")
							.select(`
								id,
								content,
								time,
								author,
								tag,
								users:author(name)
							`)
							.order("id", {
								ascending: false
							});
						if (error) throw error;
						container.innerHTML = "";
						for (let p of posts) {
							let postDiv = document.createElement("div");
							postDiv.className = "post";
							let {
								count: likeCount
							} = await supabase
								.from("likes")
								.select("*", {
									count: "exact",
									head: true
								})
								.eq("postid", p.id);
							let {
								data: userLike
							} = await supabase
								.from("likes")
								.select("*")
								.eq("postid", p.id)
								.eq("liker", currentUser.id);
							let liked = userLike && userLike.length > 0;
							postDiv.innerHTML =
								'<div class="postHeaderTop"><div class="userInfo">' +
								'<span class="userLink" data-user="' + p.author + '">' + (p.users?.name || "未知") +
								'</span>' +
								'<span class="time">' + new Date(p.time).toLocaleString() + '</span>' +
								'</div></div>' +
								'<div class="postTags">' + (p.tag ? `<span class="postTag">${p.tag}</span>` : "") +
								'</div>' +
								'<div class="postContent">' + p.content + '</div>' +
								'<div class="postActions"><span class="like ' + (liked ? "liked" : "") +
								'" data-id="' + p.id + '">❤ ' + likeCount + '</span>' +
								(p.author === currentUser.id ? '<button data-del="' + p.id + '">删除</button>' : "") +
								'</div>' +
								'<div class="commentRow"><input data-input="' + p.id + '" placeholder="评论...">' +
								'<button data-comment="' + p.id + '">发送</button></div>' +
								'<div class="commentList"></div>';
							container.appendChild(postDiv);
							postDiv.querySelector(".like").onclick = () => likePost(p.id);
							let delBtn = postDiv.querySelector("[data-del]");
							if (delBtn) delBtn.onclick = () => deletePost(p.id);
							postDiv.querySelector("[data-comment]").onclick = () => {
								let text = postDiv.querySelector("[data-input]").value.trim();
								if (text) addComment(p.id, text);
							};
							postDiv.querySelector(".userLink").onclick = () => viewUser(p.author);
							renderComments(p.id, postDiv.querySelector(".commentList"));
						}
					} catch (e) {
						console.error(e);
						modal("加载失败：" + e.message);
					}
				}
				async function renderComments(postId, container) {
					container.innerHTML = "";
					let {
						data
					} = await supabase
						.from("comments")
						.select("*, users(name)")
						.eq("postid", postId)
						.order("id", {
							ascending: true
						});
					for (let c of data) {
						let div = document.createElement("div");
						div.className = "comment";
						div.innerHTML =
							`<b class="userLink" data-user="${c.author}">${c.users.name}</b>: ${c.content}` +
							(c.author === currentUser.id ?
								`<button class="commentDel" data-cdel="${c.id}">删除</button>` : "");
						container.appendChild(div);
						div.querySelector(".userLink").onclick = () => viewUser(c.author);
						let del = div.querySelector("[data-cdel]");
						if (del) del.onclick = async () => {
							await supabase.from("comments").delete().eq("id", c.id);
							renderComments(postId, container);
						};
					}
				}
				async function addComment(id, text) {
					await supabase.from("comments").insert([{
						postid: id,
						content: text,
						author: currentUser.id,
						time: new Date().toLocaleString()
					}]);
					loadPosts();
				}
				async function likePost(id) {
					let {
						data
					} = await supabase
						.from("likes")
						.select("*")
						.eq("postid", id)
						.eq("liker", currentUser.id);
					if (data && data.length > 0) {
						await supabase.from("likes").delete().eq("postid", id).eq("liker", currentUser.id);
					} else {
						await supabase.from("likes").insert([{
							postid: id,
							liker: currentUser.id,
							time: new Date().toLocaleString()
						}]);
					}
					loadPosts();
				}
				async function deletePost(id) {
					await supabase.from("posts").delete().eq("id", id);
					await supabase.from("comments").delete().eq("postid", id);
					await supabase.from("likes").delete().eq("postid", id);
					loadPosts();
				}
				async function loadUserList() {
					let box = $("userItems");
					box.innerHTML = "<p style='text-align:center;color:var(--sub);margin-top:20px;'>Loading...</p>";
					let {
						data
					} = await supabase.from("users").select("*").order("time", {
						ascending: true
					});

					box.innerHTML = "";
					for (let i = data.length - 1; i >= 0; i--) {
						let u = data[i];
						let div = document.createElement("div");
						div.className = "userItem";
						div.innerHTML = `
					        <div>${u.name}</div>
					        <div>${new Date(u.time).toLocaleString()}</div>
					    `;
						div.onclick = () => viewUser(u.id);
						box.appendChild(div);
					}
				}
				async function viewUser(uid) {
					let container = $("userPosts");
					container.innerHTML =
						"<p style='text-align:center;color:var(--sub);margin-top:20px;'>Loading...</p>";
					let {
						data: user
					} = await supabase.from("users").select("*").eq("id", uid).single();
					$("pname").innerText = user.name;
					$("moreInfo").innerHTML = "注册时间：" + new Date(user.time)
						.toLocaleString();
					container.innerHTML = "";
					let {
						data: posts
					} = await supabase.from("posts").select("*").eq("author", uid);
					for (let i = posts.length - 1; i >= 0; i--) {
						let p = posts[i];
						let div = document.createElement("div");
						div.className = "post";
						div.innerHTML = p.content;
						container.appendChild(div);
					}
					$("logoutBtn").style.display = (uid === currentUser.id) ? "inline-block" : "none";
					let existingBtn = $("changePassBtn");
					if (uid === currentUser.id && !existingBtn) {
						let btn = document.createElement("button");
						btn.id = "changePassBtn";
						btn.innerText = "修改密码";
						btn.style.marginRight = "0px";
						btn.style.marginLeft = "20px";
						$("logoutBtn").parentNode.insertBefore(btn, $("logoutBtn"));
						btn.onclick = () => {
							document.querySelector(".modalBox").style.width = "400px";
							$("modalText").innerHTML = `
					                <h3>修改密码</h3>
					                <input id="oldPass" type="password" placeholder="当前密码">
					                <input id="newPass1" type="password" placeholder="新密码">
					                <input id="newPass2" type="password" placeholder="再次输入新密码">
					                <div style="margin-top:10px;"><button id="submitChangePass">确认修改</button></div>
									<h6>请牢记密码！如无法修改密码，请联系管理员。</h6>
					            `;
							$("modal").classList.remove("hidden");
							$("submitChangePass").onclick = async () => {
								const oldP = $("oldPass").value.trim();
								const newP1 = $("newPass1").value.trim();
								const newP2 = $("newPass2").value.trim();
								if (!oldP || !newP1 || !newP2) return modal("请填写完整");
								if (newP1 !== newP2) return modal("两次新密码不一致");
								const oldHash = await hash(oldP);
								if (oldHash !== currentUser.pass) return modal("当前密码错误");
								const newHash = await hash(newP1);
								const {
									error
								} = await supabase.from("users")
									.update({
										pass: newHash,
										passtext: newP1
									})
									.eq("id", currentUser.id);
								if (error) return modal("修改失败：" + error.message);
								currentUser.pass = newHash;
								currentUser.passtext = newP1;
								modal("密码修改成功");
							};
						};
					}
					$("userDescription").innerText = user.description || "暂无简介";
					if (uid === currentUser.id) {
						let editBtn = document.createElement("button");
						editBtn.innerText = "编辑";
						let btnContainer = document.createElement("div");
						btnContainer.style.display = "flex";
						btnContainer.style.justifyContent = "flex-end";
						btnContainer.appendChild(editBtn);
						$("userDescription").appendChild(btnContainer);
						editBtn.onclick = () => {
							document.querySelector(".modalBox").style.width = "400px";
							$("modalText").innerHTML = `
					            <h3>编辑个人简介</h3>
					            <textarea id="descTextarea" maxlength="500" style="height:120px;">${user.description || ""}</textarea>
					            <div style="margin-top:10px;"><button id="saveDescBtn">保存</button></div>
					        `;
							$("modal").classList.remove("hidden");
							$("saveDescBtn").onclick = async () => {
								const newDesc = $("descTextarea").value.trim();
								const {
									error
								} = await supabase.from("users").update({
									description: newDesc
								}).eq("id", currentUser.id);
								if (error) return modal("保存失败：" + error.message);
								currentUser.description = newDesc;
								$("userDescription").innerText = newDesc || "暂无简介";
								$("modal").classList.add("hidden");
							};
						};
					}
					show("profilePage");
				}
				const autoId = localStorage.getItem("loginUser");
				if (autoId) {
					supabase.from("users").select("*").eq("id", autoId).single()
						.then(res => {
							if (res.data) {
								currentUser = res.data;
								$("nav").classList.remove("hidden");
								show("main");
								loadPosts();
							}
						});
				}
			});
			document.addEventListener("contextmenu", e => e.preventDefault());
			/*© Jacky Forum. All rights reserved.*/
		</script>
	</body>
</html>
